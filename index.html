-羟甲基糠醛（HMF，5-hydroxymethylfurfural），是蔗糖在中低温加热下的特征性分解产物，呈现出焦糖/糖蜜甜香的轻柔底调；麦芽酚（maltol），以低浓度存在时贡献清甜的焦糖香气；葡萄糖与果糖等还原糖则直接提供味觉层面的甜感刺激。与红糖相比，黄糖感对应的Maillard产物（呋喃类、吡喃酮类）生成量更少、更浅，因此甜感更明亮、不厚重。处理工艺层面，轻蜜处理（Yellow Honey Process）中果胶层的适度保留，可使豆体在发酵阶段积累更多轻度降解的果糖与蔗糖分子，形成对应的黄糖甜感前体；烘焙上，轻至中浅度烘焙（Agtron 70–80区间）有助于保留HMF与轻焦糖化产物，使黄糖甜感得以完整呈现。"},{"id":127,"nameZh":"蜂蜜","nameEn":"Honey","categoryId":8,"category":"甜味 SWEET","description":"蜂蜜呈现花蜜般甜香与黏润口感联想，常与\"甜味芳香/蜜糖甜\"并行出现。","flavor":"蜂蜜风味在咖啡中是一种兼具甜感、芳香与质感三维度的复合体验，难以归入单一的\"甜\"或\"花\"范畴，而是二者在一个黏润、温暖介质中的自然融合。干香阶段即可捕捉到近似洋槐蜜或百花蜜的甜蜜气息；湿香时，蜂蜜感更加鲜活立体，带有花粉的微粉感与轻微蜡质底调。入口后，甜感如蜜般顺滑流动，在口腔中段形成一种\"甜而有重量\"的挂口感，伴随轻微的花酸收口，令整杯咖啡的余韵绵长而不腻。参照物为常温未加热的百花蜜或荔枝蜜——甜感饱满、香气丰富，黏润但不过分浓稠。蜜处理（Honey Process）咖啡因工艺特性，通常为蜂蜜风味的最典型呈现载体，尤以哥斯达黎加、巴拿马及埃塞俄比亚蜜处理批次最为突出。","cause":"蜂蜜风味的主要呈香物质由酵母代谢产物主导，核心化合物为苯乙醇（2-phenylethanol），具有典型的玫瑰蜂蜜花香特征，由酿酒酵母（Saccharomyces cerevisiae）通过苯丙氨酸（phenylalanine）的Ehrlich降解途径代谢产生；与之协同的苯乙酸乙酯（ethyl phenylacetate）进一步强化蜂蜜甜香深度。蜡质底调来源于长链脂肪醇（如十六醇cetyl alcohol）及微量蜜蜡香气物质。此外，β-大马酮（β-damascenone）在ppb级别的微量存在下，可作为整体甜香的增效剂，与蜂蜜香气物质协同放大感知强度。蜜处理工艺中，咖啡果胶（mucilage）的保留使豆体在干燥阶段经历缓慢有氧发酵，酵母优势菌群大量代谢产生苯乙醇及相关酯类；同时，果胶中的果糖、半乳糖醛酸等糖类直接为酵母提供代谢底物，是蜂蜜风味形成的工艺基础。烘焙中，麦芽酚的生成进一步丰富甜香层次，而适度（中浅烘焙）的热处理则保留了上述挥发性香气物质不被过度裂解。"},{"id":128,"nameZh":"枫糖浆","nameEn":"Maple Syrup","categoryId":8,"category":"甜味 SWEET","description":"枫糖浆为树汁熬制的甜味参照，常带木质、焦糖化与清甜的复合香气。","flavor":"枫糖浆风味是咖啡甜味谱系中极具辨识度的特殊类型，兼具甜感的饱满度、木质感的优雅底韵与焦糖化的温暖气息，三者以一种自然、和谐的方式交织融合。在干香阶段，可感知到类似枫糖浆开瓶瞬间的清甜木质香气；湿香中，甜感更为浓郁，带有轻微的奶油底调与类似棕色香料（肉桂、丁香微量）的复杂气息。入口后，甜感圆润饱满，质地略有黏稠感，余韵中残留着若有若无的木质甜香，如同用枫木桶陈化的甜味蒸馏酒的收口感。参照物为加拿大Grade A深琥珀色枫糖浆（Dark Amber Maple Syrup）——甜感浓郁而有层次，焦糖化与木质感并存。常见于中度烘焙的埃塞俄比亚日晒豆、危地马拉安提瓜水洗豆及部分日晒处理的巴西塞拉多豆。","cause":"枫糖浆风味的核心化学物质为糠醛衍生物与挥发性酚类的组合。最关键的呈香物质是5-甲基糠醛（5-methylfurfural）与呋喃酮类化合物（尤其是ABHF：2-acetyl-5-butylfuran及SOTOLONE，枫糖浆的特征性风味物质），索托隆（sotolon，3-hydroxy-4,5-dimethyl-2(5H)-furanone）在低浓度下具有极强的枫糖浆/焦糖/胡芦巴甜香特征，是枫糖浆风味的关键标志物。此外，丁香酚（eugenol）及其衍生物提供木质香料底调，与甜香形成层次对比。索托隆主要来源于苏氨酸（threonine）的Maillard反应分解路径，在中度烘焙（一爆密集阶段）时大量生成；5-甲基糠醛则来自戊糖（阿拉伯糖、木糖）的焦糖化降解。日晒/蜜处理中，果皮层的缓慢干燥促进豆体内有机酸（如苹果酸）与糖分的协同转化，为枫糖浆甜香前体物质的积累提供有利条件。"},{"id":129,"nameZh":"黄油","nameEn":"Butter","categoryId":8,"category":"甜味 SWEET","description":"黄油联想偏乳脂、柔滑与奶甜的香气背景，常与焦糖/坚果烘烤香形成组合。","flavor":"黄油风味在咖啡中呈现出一种厚实、暖润、令人安心的乳脂感——如同烘烤中融化的无盐黄油，甜感不张扬却深具包裹力，将口腔铺覆在一层温暖的奶油质感之中。干香阶段可感知到类似刚出炉黄油曲奇的奶甜烤香；湿香时，黄油感更为显性，与坚果、焦糖形成自然的香气组合，令人联想到法式奶油焦糖布丁（Crème Brûlée）或黄油煎香的杏仁片。入口后，乳脂感在口腔中段形成柔顺的质感铺陈，甜感缓释而非爆发，余韵中有隐约的奶香收口。常见于中至中深烘焙的巴西波旁、危地马拉安提瓜及部分日晒处理的萨尔瓦多圣塔安娜豆，豆体油脂丰富者表现尤为突出。","cause":"黄油风味的核心呈香物质为双乙酰（diacetyl，2,3-丁二酮），是乳酸菌（LAB）在乳酸发酵中通过柠檬酸降解途径产生的特征性黄油/奶油风味物质，在适当浓度（0.1–1 ppm）下呈现典型的黄油甜香，高浓度则产生不悦的\"爆米花感\"。与之协同的乙偶姻（acetoin，3-羟基-2-丁酮）是双乙酰的还原产物，具有更柔和的奶油底调。δ-癸内酯（δ-decalactone）提供奶油/椰乳质感的乳脂感支撑，来源于亚油酸等不饱和脂肪酸在烘焙中的氧化环化反应。2,3-戊二酮（2,3-pentanedione）则进一步丰富奶油/黄油香气轮廓的复杂度。处理工艺层面，含有乳酸菌优势菌群的厌氧发酵（anaerobic fermentation）或湿处理（washed process）发酵阶段，是双乙酰与乙偶姻大量形成的关键节点；烘焙中，中至中深度烘焙的慢速升温曲线有利于脂肪酸氧化生成内酯类化合物，使黄油风味在杯中得到充分展现。"},{"id":130,"nameZh":"奶油","nameEn":"Cream","categoryId":8,"category":"甜味 SWEET","description":"奶油强调更明显的乳脂顺滑与甜润口感联想，常用于描述甜感\"圆润度\"。","flavor":"奶油风味在咖啡中是一种比黄油更轻盈、比牛奶更丰腴的中间质地体验——犹如一勺打发至五成的淡奶油（whipping cream）轻轻滑过舌面：质感顺滑如丝，甜感柔和低调，乳香清新而非浓重，带有轻微的甜奶气息与若隐若现的香草底调。在口腔中，奶油感表现为质地上的\"圆润度\"与\"包裹感\"，使整杯咖啡的酸感被柔化、苦感被平衡，令风味整合更为和谐。在鼻后嗅觉中，可感知到类似法式鲜奶油或淡奶油布丁的清雅乳香。参照物为未加糖的UHT淡奶油（35%脂肪含量）——乳脂感突出，甜润而不甜腻，收口干净。常出现在哥伦比亚慧兰（Huila）水洗豆、巴拿马低海拔波旁及部分厌氧发酵精品批次中，尤以中浅烘焙表现最为优雅。","cause":"奶油风味的关键呈香/呈味物质以内酯类化合物为主导：γ-壬内酯（γ-nonalactone，椰乳/奶油甜香）与δ-癸内酯（δ-decalactone，奶油/水蜜桃甜香）是最重要的乳脂香气载体，均来源于咖啡脂质中长链不饱和脂肪酸（亚油酸C18:2、油酸C18:1）在烘焙过程中的β-氧化与环化反应。乙偶姻（acetoin）在低浓度下贡献柔和的奶油气息，是乳酸菌发酵的代谢副产物。奶油质感（mouthfeel）的物理基础则来自咖啡中的高分子多糖（甘露聚糖mannans、阿拉伯半乳聚糖arabinogalactans）在萃取液中形成的胶体结构，赋予液体丝滑的流动质感。处理工艺层面，厌氧乳酸发酵（anaerobic lactic fermentation）中乳酸菌大量产生的乙偶姻与乳酸协同，是奶油感形成的重要发酵路径；烘焙层面，中浅至中度烘焙（Agtron 65–75）保留了内酯类化合物的完整结构，避免其因高温裂解而损失，是奶油感在杯中完整呈现的关键烘焙控制点。"},{"id":131,"nameZh":"摩卡","nameEn":"Mocha","categoryId":8,"category":"甜味 SWEET","description":"摩卡为咖啡与巧克力复合联想，体现可可甜香与咖啡烘烤香的结合。","flavor":"摩卡风味在咖啡中是一种极具层次感与戏剧张力的复合体验——不是单纯的\"巧克力味\"，而是可可的微苦甜香与咖啡烘烤香气自然交融后产生的第三种共鸣：仿佛一块黑巧克力碎片融化在刚出炉的咖啡蛋糕上，甜、苦、烤、奶四重感知同步展开。在干香阶段，可感知到深色可可粉与轻微焦糖化的复合烤香；湿香中，可可甜香愈发浓郁，带有隐约的深色浆果（黑加仑/黑莓）底调——这正是摩卡风味区别于简单\"巧克力感\"的标志性复杂度。入口后，苦甜感平衡，质感圆润醇厚，中段出现奶油巧克力的顺滑过渡，余韵中留有可可粉与深色烤坚果的悠长收口。参照物为72%黑巧克力与意式浓缩咖啡的混合体验，或也门摩卡港（Mocha Port）的传统日晒处理豆——摩卡风味的历史原点与地理溯源。常见于也门马塔里（Mattari）日晒豆、埃塞俄比亚哈拉尔（Harrar）日晒豆及部分深蜜处理的中美洲豆。","cause":"摩卡风味是咖啡化学中最为复杂的复合风味之一，其核心物质来自烘焙产物与可可类香气物质的叠加共振。关键呈香物质包括：吡嗪类（pyrazines），尤其是2,5-二甲基吡嗪（2,5-dimethylpyrazine）与2,6-二甲基吡嗪（2,6-dimethylpyrazine），具有典型的可可/巧克力/烘烤坚果香气，是Maillard反应中氨基酸（脯氨酸、丙氨酸）与还原糖在高温（>180°C）下缩合生成的核心烘烤香气物质；可可醛/苯乙醛类（phenylacetaldehyde），带有可可花香底调；2-乙酰基吡咯（2-acetylpyrrole），提供深色烤香与可可的厚实底韵；此外，硫醇类化合物（如糠基硫醇furfuryl mercaptan）在痕量水平下对咖啡整体烘烤香气有关键贡献，并与可可香气产生协同增效。可可苦甜感的呈味基础为咖啡碱（caffeine）与绿原酸内酯（chlorogenic acid lactones）的苦味协同，以及可可类风味中的儿茶素类（catechins）苦涩感联想。处理工艺层面，也门及埃塞俄比亚日晒处理中长达4–6周的超长干燥发酵周期，使豆体内积累大量的吡嗪类前体氨基酸与还原糖，在烘焙中充分转化为摩卡特征的可可烘烤香气复合体；中深度烘焙（Agtron 45–55）是摩卡风味发展的最佳烘焙区间，此阶段吡嗪类生成量达到峰值，同时保留足够的甜感物质使苦甜平衡不失衡。"},{"id":132,"nameZh":"坚果/可可","nameEn":"Nutty/Cocoa","categoryId":4,"category":"坚果/可可 NUTTY/COCOA","description":"坚果/可可是风味轮常用大类词，用于概括坚果香、可可与巧克力等温暖甜香谱系。","flavor":"此大类在杯测中呈现为一组温暖、厚实、令人愉悦的干性甜香谱系。坚果端以烘烤脂香为基础，带有油润质感与轻微焦糖化的甜感；可可端则向苦甜平衡过渡，兼具粉质的干燥感与深邃的烘焙底调。整体香气饱满、包裹感强，在中高烘焙豆中尤为突出，余韵悠长且稳定。","cause":"该大类风味的核心呈香物质来源于烘焙过程中的美拉德反应（Maillard Reaction）与焦糖化反应（Caramelization）。坚果香的主要贡献者为吡嗪类化合物（Pyrazines，如2-甲基吡嗪、2,3-二甲基吡嗪），由氨基酸与还原糖在高温下反应生成；可可/巧克力香则主要由甲基吡嗪、2-乙基吡嗪及呋喃类（Furans，如糠醛、5-甲基糠醛）协同贡献。烘焙度越深，吡嗪类与呋喃类浓度越高，坚果可可特征越显著。"},{"id":133,"nameZh":"坚果","nameEn":"Nutty","categoryId":4,"category":"坚果/可可 NUTTY/COCOA","description":"坚果为子类词，用于概括杏仁、榛子、核桃等带来的坚果脂香与烘烤香联想。","flavor":"在杯测中表现为温和、圆润的油脂烘烤香，类似混合坚果经轻度烤制后散发的香气：前段带有轻盈的焦糖甜感与干性花香，中段进入饱满的烘烤脂香，整体质地油润而不腻。在口腔中，可感知到细腻的坚果粉质感，回甘持久、柔和，余味中留有淡淡的木质温香。在中度至中深度烘焙豆中最为典型。","cause":"坚果香的核心呈香物质为吡嗪类化合物，尤以2-甲基吡嗪（2-Methylpyrazine）、2,5-二甲基吡嗪（2,5-Dimethylpyrazine）、2-乙基吡嗪（2-Ethylpyrazine）为主，由美拉德反应中氨基酸（如缬氨酸、亮氨酸）与还原糖在140–180°C区间反应生成。此外，噻唑类（Thiazoles）、呋喃酮类（如HEMF，4-羟基-2,5-二甲基-3(2H)-呋喃酮）也协同贡献烘烤甜香。烘焙深度与生豆氨基酸组成是影响坚果香强度的关键工艺参数。"},{"id":134,"nameZh":"巧克力","nameEn":"Chocolate","categoryId":4,"category":"坚果/可可 NUTTY/COCOA","description":"巧克力是对可可制品甜香与苦甜平衡的总括联想词，可覆盖黑巧/牛奶巧的上位描述。","flavor":"杯测中呈现为令人满足的深沉甜香：开盖即有温暖的可可气息扑面而来，带有隐约的焦糖与烘烤调。入口后甜感与苦感和谐交织，质地如融化巧克力般滑腻绵长，没有明显的刺激性或尖锐边缘。余韵中保留淡淡的可可粉干香与烘烤后调，整体印象圆融、包裹感强，令人联想到优质黑巧克力在口腔中缓缓化开的体验。","cause":"巧克力风味由多类呈香物质协同构成。核心为甲基吡嗪（Methylpyrazine）、三甲基吡嗪（Trimethylpyrazine）等吡嗪类化合物（源自可可发酵与烘焙美拉德反应），以及糠醛（Furfural）、5-甲基糠醛等呋喃类化合物。苦甜平衡则与可可碱（Theobromine）、咖啡因（Caffeine）及绿原酸降解产物（如奎宁酸内酯）密切相关。咖啡烘焙中，发酵处理提升前体氨基酸含量，进一步强化美拉德产物的巧克力特征，烘焙温度在190–220°C区间是吡嗪类生成的关键窗口。"},{"id":135,"nameZh":"碧根果","nameEn":"Pecan","categoryId":4,"category":"坚果/可可 NUTTY/COCOA","description":"碧根果香气偏奶油、烘烤与甜坚果脂香。","flavor":"碧根果风味在杯测中呈现为细腻而丰盈的奶油坚果香：前调有淡雅的黄油甜感，仿佛轻烤后的碧根果刚从烤箱取出时的温润气息；中调进入饱满的脂香核心，带有隐约的焦糖与轻微香草尾韵；口感上质感油润，甜感柔和不突兀，苦感极低，整体呈现出优雅的\"甜坚果奶油\"复合印象，在浅中度烘焙的水洗豆或蜜处理豆中较为常见。","cause":"碧根果风味的核心来源于δ-癸内酯（δ-Decalactone）与γ-壬内酯（γ-Nonalactone）等内酯类化合物，它们赋予奶油般的甜脂感；同时，甲基丁酸乙酯（Ethyl 2-methylbutanoate）等酯类提供甜果脂香背景。吡嗪类（如2,3-二甲基吡嗪）贡献烘烤坚果底调。内酯类物质在咖啡中主要由脂肪酸在烘焙中氧化环化生成，生豆脂肪酸组成（如棕榈酸、亚油酸含量）及烘焙曲线（升温速率与峰值温度）直接影响其浓度与比例。"},{"id":136,"nameZh":"瓜子","nameEn":"Melon Seed","categoryId":4,"category":"坚果/可可 NUTTY/COCOA","description":"瓜子风味参照常指烘烤瓜子仁的谷物坚果香与轻油脂感。","flavor":"在杯测中，瓜子风味表现为质朴、干燥的谷物坚果香，带有轻度烘烤的焦壳感与薄薄的油脂层次，类似手工炒制白瓜子仁所散发的朴素香气。整体风味清淡内敛，甜感极浅，略带谷物的淡咸感与干燥粉质感，质地轻薄，余味短促而干净，常出现在日晒或轻发酵处理的中度烘焙豆的中段风味中。","cause":"瓜子风味与谷物坚果香主要来源于低链烷基吡嗪（如2-甲基吡嗪、乙基吡嗪）及少量己醛（Hexanal）、壬醛（Nonanal）等脂肪醛类化合物（由不饱和脂肪酸的氧化裂解生成）。谷物干香则与呋喃类（如糠醛）和少量噻吩类化合物相关。生豆中的亚油酸经烘焙氧化可产生己醛等关键风味醛，贡献谷物/坚果的干性香气特征，其浓度受烘焙温度与烘焙时间的双重调控。"},{"id":137,"nameZh":"葵瓜子","nameEn":"Sunflower Seed","categoryId":4,"category":"坚果/可可 NUTTY/COCOA","description":"葵瓜子常见烘烤后呈现坚果与谷物复合香，并带轻微油脂甜感。","flavor":"葵瓜子风味在杯测中表现为略重于普通瓜子的坚果谷物复合香，带有更明显的油脂丰盈感与轻微的烘烤甜壳香。类似将葵花籽仁轻度烤制后剥壳时散发的那种介于坚果与谷物之间的温暖香气；口感上略有油润感，甜感柔和，尾段带轻微干燥的木质余味。此风味常出现在中度烘焙的日晒处理豆或部分厌氧处理豆中。","cause":"葵瓜子的坚果谷物香主要来源于甲基吡嗪、二甲基吡嗪等吡嗪类化合物，以及2-乙酰基吡咯（2-Acetylpyrrole）等含氮杂环化合物（美拉德反应产物）。油脂甜感则由γ-丁内酯（γ-Butyrolactone）、δ-戊内酯等短链内酯类协同提供。葵花籽富含亚油酸，与咖啡生豆的不饱和脂肪酸氧化路径类似，烘焙过程中脂肪酸氧化分解生成的醛酮类化合物（如2-壬酮）也参与构成其油脂甜香特征。"},{"id":138,"nameZh":"板栗","nameEn":"Chestnut","categoryId":4,"category":"坚果/可可 NUTTY/COCOA","description":"板栗带有淀粉甜与坚果香，熟制后常呈现甜糯与温暖烘烤香。","flavor":"板栗风味在杯测中呈现为独特的淀粉甜香与柔和坚果香的交融，类似糖炒板栗从铁锅中倒出那一刻的温暖甜糯气息——既有淀粉糊化后的绵软甜感，又有轻度焦糖化带来的褐色甜香，还夹带着隐约的烟熏与木质温调。整体风味圆润、质感厚实，甜感持久且不尖锐，余味中有淀粉感的干净甜余，令人愉悦。常见于中深度烘焙的巴西或埃塞俄比亚日晒豆。","cause":"板栗风味的淀粉甜香主要来源于麦芽酚（Maltol）与乙基麦芽酚（Ethyl Maltol）——两者均为糖类焦糖化反应的典型产物，赋予甜糯感；烘烤坚果香由吡嗪类化合物（如2-乙酰基吡嗪，2-Acetylpyrazine，具有爆米花/烤坚果特征）贡献。此外，5-羟甲基糠醛（HMF）在高温烘焙中大量生成，提供焦甜底调。上述物质均受烘焙温度（尤其是一爆后阶段，约196–205°C）的显著影响，日晒处理因生豆糖分含量更高，板栗甜感往往更为突出。"},{"id":139,"nameZh":"奶油巧克力","nameEn":"Cream Chocolate","categoryId":4,"category":"坚果/可可 NUTTY/COCOA","description":"奶油巧克力强调巧克力香与奶油般顺滑甜感的结合。","flavor":"奶油巧克力风味在杯测中如同一杯上好的热可可：开盖时可可甜香与奶油脂感交织飘散，温润细腻；入口后，苦感轻柔，甜感丰盈，质地如丝绒般顺滑，带有明显的乳脂感与淡淡的香草尾调；整体风味柔和包裹、层次圆融，没有尖锐的酸或涩，余韵悠长甜美，令人联想到加了少许奶油的优质牛奶巧克力融化在舌尖的体验。多见于蜜处理或乳酸发酵处理的中度至中深度烘焙豆。","cause":"奶油巧克力风味由多类物质协同呈现。乳脂/奶油感来源于双乙酰（Diacetyl）与乙偶姻（Acetoin）——两者均为乳酸菌发酵（LAB发酵）的典型副产物，在蜜处理和乳酸发酵处理中尤为突出；巧克力香则由甲基吡嗪、三甲基吡嗪等吡嗪类主导；γ-壬内酯（γ-Nonalactone）、δ-癸内酯（δ-Decalactone）等内酯类提供奶油甜脂感；香草尾调则与少量香兰素（Vanillin，由阿魏酸在烘焙中热解生成）有关。乳酸发酵工艺是触发双乙酰与内酯类生成的关键处理节点。"},{"id":140,"nameZh":"脆香米巧克力","nameEn":"Crispy Rice Chocolate","categoryId":4,"category":"坚果/可可 NUTTY/COCOA","description":"巧克力与脆米/谷物的复合联想，强调谷物脆香与甜可可气息。","flavor":"脆香米巧克力风味在杯测中呈现为趣味性的双重质感联想：可可甜香为主轴，其上叠加了一层轻盈、干燥的谷物脆香，类似咬开一颗脆香米巧克力时，巧克力的甜蜜与膨化米的焦脆香气同步释放的感受。整体风味节奏活泼——甜感圆润，谷物焦香轻盈爽脆，两者之间没有明显断层，衔接自然。余味干净，带轻微谷物粉感，常出现在日晒处理中度烘焙豆中，尤其是生豆含水量偏低、谷物感本底较强的产区豆。","cause":"谷物焦脆香的核心呈香物质为2-乙酰基吡嗪（2-Acetylpyrazine，具有典型的爆米花/烤谷物香气特征）及2-乙酰基呋喃（2-Acetylfuran），均为美拉德反应产物。可可甜香由三甲基吡嗪、糠醛及5-甲基糠醛提供。咖啡在烘焙中一爆阶段（约196°C）后，内部压力使细胞壁破裂，大量吡嗪类与呋喃类化合物快速形成，赋予谷物焦香；日晒处理因前体还原糖含量更高，美拉德产物生成量更大，谷物巧克力的复合感更为明显。"},{"id":141,"nameZh":"威化巧克力","nameEn":"Wafer Chocolate","categoryId":4,"category":"坚果/可可 NUTTY/COCOA","description":"强调可可甜香与烘焙饼干/威化的干香组合。","flavor":"威化巧克力风味在杯测中呈现为一种干爽而甜蜜的双重香气组合：主调为柔和的可可巧克力甜香，背景叠加了类似烤饼干或威化卷心的干燥谷物烘焙香，带有轻微的黄油酥脆感与淡淡的面粉焦香。整体风味偏干、偏轻，甜感不腻，苦感极低，层次清晰，口感上仿佛咬下一口夹有可可奶油的威化饼干——外层的干脆与内层的甜润形成愉快对比。常出现在浅中度至中度烘焙的水洗处理豆中。","cause":"威化饼干的干香谷物感主要由2-乙酰基吡嗪、2-乙酰基呋喃及吡咯类（如1-甲基吡咯，1-Methylpyrrole）提供，均为美拉德反应的含氮杂环产物；黄油酥香则来源于双乙酰（Diacetyl）及短链脂肪酸乙酯（如乙酸乙酯，Ethyl Acetate）；可可香由甲基吡嗪与糠醛协同贡献。水洗处理豆因酸度较高，酯类化合物更为丰富，有助于强化威化的轻盈酥香感；烘焙曲线中一爆前的干燥脱水阶段（烘豆机内温120–150°C）对吡咯类化合物的生成有关键影响。"},{"id":142,"nameZh":"牛奶巧克力","nameEn":"Milk Chocolate","categoryId":4,"category":"坚果/可可 NUTTY/COCOA","description":"牛奶巧克力呈现更柔和的可可甜香、奶甜与低苦感联想。","flavor":"牛奶巧克力风味在杯测中是最令人亲切的风味之一：香气温柔、甜感圆融，可可香被奶甜感充分包裹，如同一块优质牛奶巧克力在手中微微软化时飘散的气息——甜蜜、奶香、微微可可苦感三者完美交融。口感上丝滑绵柔，乳脂感明显，苦感极轻，酸度低，整体令人愉悦放松。余韵中有持久的奶油甜香，带轻微焦糖尾调。常见于蜜处理或天然处理的巴西、哥伦比亚中度烘焙豆。","cause":"牛奶巧克力风味由可可香与乳香两组物质协同呈现。可可甜香主要由甲基吡嗪、2,3,5-三甲基吡嗪（2,3,5-Trimethylpyrazine）及糠醛贡献；奶甜/乳脂感来源于δ-癸内酯（δ-Decalactone）、γ-壬内酯（γ-Nonalactone）等内酯类化合物，以及双乙酰（Diacetyl）与乙偶姻（Acetoin）——后两者在蜜处理咖啡的中温发酵阶段由乳酸菌代谢产生；麦芽酚（Maltol）提供焦糖甜底调。处理工艺中，带壳日晒（蜜处理）时果肉糖分渗透至豆体，提升内酯类与双乙酰前体含量，是牛奶巧克力风味形成的重要工艺基础。"},{"id":143,"nameZh":"黑巧克力","nameEn":"Dark Chocolate","categoryId":4,"category":"坚果/可可 NUTTY/COCOA","description":"黑巧克力表现更高可可强度，常带苦甜平衡、烘烤可可与轻干涩感。","flavor":"黑巧克力风味在杯测中呈现为深沉、有力度的可可香气：开盖即感知到浓郁的烘烤可可气息，带有明显的苦感与少许干燥感，类似高可可含量（70%以上）黑巧克力入口时的苦甜层次感——先苦后甜，回甘悠长。口感上，单宁感适度，质地厚重，带有轻微的干涩收敛感，酸度低但厚度高，余味中有持久的可可烘烤后调与轻微的木质温感。在中深度至深度烘焙豆中最为典型。","cause":"黑巧克力的高强度可可苦甜特征来源于多类化合物的协同作用。苦感主要由绿原酸热解产物（Chlorogenic Acid Lactones，绿原酸内酯类，如3-咖啡酰奎宁酸内酯）及二酮吡嗪类（Diketopiperazines）贡献；高浓度三甲基吡嗪与四甲基吡嗪（Tetramethylpyrazine）赋予强烈的烘烤可可香；涩感则与单宁前体（绿原酸降解生成的多酚类聚合物）相关。深度烘焙（二爆阶段，约220°C以上）促使绿原酸大量降解生成内酯类苦味物质，同时高温使吡嗪类化合物浓度持续升高，是黑巧克力风味形成的核心烘焙机制。"},{"id":144,"nameZh":"可可粉","nameEn":"Cocoa Powder","categoryId":4,"category":"坚果/可可 NUTTY/COCOA","description":"可可粉呈现干燥粉感的可可香，苦感更突出，甜感较弱。","flavor":"可可粉风味在杯测中呈现为纯粹、干燥而直接的可可香气：没有巧克力的甜润包裹，仅有可可豆烘焙后研磨时散发的那种粗砺、粉质、带轻微苦涩的干性可可气息。入口后，苦感先行，甜感后至且微弱，质地偏干，带有明显的粉感与轻微收敛感，余味中有持久的可可粉干香。整体风味质朴、醇厚，如同直接舔舐一勺无糖纯可可粉时的感受。常见于中深度烘焙的罗布斯塔拼配豆或深度烘焙单品豆。","cause":"可可粉的干燥苦涩特征主要由绿原酸内酯类（Chlorogenic Acid Lactones）和二酮吡嗪类（Diketopiperazines，如环（脯氨酸-缬氨酸））提供苦味；粉质干香则来源于糠醛（Furfural）、5-甲基糠醛等呋喃类化合物及高浓度烷基吡嗪类；单宁类多酚聚合物（由绿原酸在高温下氧化聚合）贡献收敛涩感。深度烘焙条件下（>220°C），绿原酸近乎完全降解，苦味内酯类大量积累；同时，美拉德反应深度推进，甜感物质（如麦芽酚）被进一步消耗，导致苦感相对突出、甜感明显减弱，形成典型的可可粉干苦特征。"},{"id":145,"nameZh":"杏仁","nameEn":"Almond","categoryId":4,"category":"坚果/可可 NUTTY/COCOA","description":"杏仁常带甜坚果、轻木质与烘烤脂香联想，部分情境可伴轻微苦杏仁感。","flavor":"杏仁风味在杯测中呈现为精致、甜美且略带木质感的坚果香：类似将甜杏仁仁轻度烘烤后研磨时释放的那种细腻、油润且带有隐约甜感的坚果气息，前调有轻盈的花香与奶香边缘感，中段进入饱满的坚果脂香核心；若处理工艺或烘焙曲线偏深，可出现微量苦杏仁感（略带扁桃苷式的淡苦尾调），为风味增添深度而不显突兀。整体质感细腻，甜感持久，余味中有优雅的木质温香，常出现在水洗埃塞俄比亚或哥伦比亚浅中度烘焙豆中。","cause":"杏仁甜香的核心呈香物质为苯甲醛（Benzaldehyde）——苦杏仁的特征香气，在咖啡中微量存在，由苯丙氨酸经美拉德降解或绿原酸热解生成；甜坚果脂香由2-甲基吡嗪、2,6-二甲基吡嗪及γ-癸内酯（γ-Decalactone）协同贡献；轻微苦杏仁感与苯甲醛浓度及极微量氰苷类降解产物相关（在正常烘焙剂量下属感官愉悦阈值范围内）。水洗处理提高了苯丙氨酸前体含量，有助于苯甲醛类化合物的形成，与轻度至中度烘焙曲线配合时，杏仁特征最为清晰优雅。"},{"id":146,"nameZh":"核桃","nameEn":"Walnut","categoryId":4,"category":"坚果/可可 NUTTY/COCOA","description":"核桃常呈现更深的坚果油脂香与轻微涩感联想，烘烤后会更温暖厚重。","flavor":"核桃风味在杯测中呈现为厚实、深沉的坚果油脂香，带有轻微的单宁涩感与干燥木质感，类似将生核桃仁轻度烘烤后剥去薄皮时散发的那种带苦涩底韵的深重坚果气息。整体香气饱满、厚重，甜感内敛，苦感与涩感适度，赋予咖啡一种复杂而成熟的风味深度；口感上，收敛感轻微但可识别，后段带有温暖的烘烤木质余味，余韵绵长，适合搭配深度烘焙的单品或意式拼配。","cause":"核桃的深重坚果油脂香主要来源于2,3-二甲基吡嗪（2,3-Dimethylpyrazine）、三甲基吡嗪等深度美拉德反应吡嗪类产物；轻微涩感由单宁类多酚（绿原酸部分降解产生的儿茶素类聚合物、咖啡酸-奎宁酸缩合物）贡献；干性油脂香则与壬醛（Nonanal）、癸醛（Decanal）等长链脂肪醛（由亚油酸、油酸氧化裂解生成）相关。核桃风味在深度烘焙条件下尤为突出，原因是深烘使绿原酸大量降解产生多酚聚合物，同时高温推动吡嗪类化合物向更高取代度演化，整体风味层次向深沉厚重方向移动。"},{"id":147,"nameZh":"榛子","nameEn":"Hazelnut","categoryId":4,"category":"坚果/可可 NUTTY/COCOA","description":"榛子以甜坚果与烘烤香著称，常与巧克力/焦糖形成经典组合联想。","flavor":"榛子风味是咖啡坚果类香气中最为优雅迷人的一种：杯测中呈现为甜蜜、细腻、油润的坚果烘烤香，类似榛子粒在铁锅中翻炒至金黄后去皮时飘散的那种温暖甜坚果气息，前调带有隐约的花香与焦糖甜，中调进入饱满的坚果脂香，尾调与可可或巧克力风味天然契合，形成令人愉悦的经典\"费列罗\"式复合联想。整体风味圆润、甜感突出、油脂感适中，余韵中有持久的温暖坚果甜香。在蜜处理或轻度日晒的中度烘焙豆中最为常见。","cause":"榛子风味的核心呈香物质为5-甲基-（E）-2-庚烯-4-酮（filbertone，榛酮），这是榛子最具特征性的香气化合物，在咖啡中由不饱和脂肪酸（亚麻酸）的热氧化降解微量生成；同时，α-甲基吡嗪类与呋喃酮类（如HEMF，4-羟基-2,5-二甲基-3(2H)-呋喃酮，具有焦糖甜香）协同提供坚果甜香背景；δ-己内酯（δ-Hexalactone）等短链内酯类贡献油润奶香调。蜜处理工艺通过保留更多脂肪酸前体，在烘焙中促进榛酮类化合物的微量形成，是榛子风味强化的重要处理机制。"},{"id":148,"nameZh":"花生","nameEn":"Peanut","categoryId":4,"category":"坚果/可可 NUTTY/COCOA","description":"花生常见烘烤豆仁与油脂香，可能呈现\"花生酱/烤花生\"的甜咸坚果联想。","flavor":"花生风味在杯测中呈现为饱满、质朴、带轻微咸鲜感的坚果油脂香，类似新鲜出炉的烤花生仁散发的那种浓郁、直接的坚果气息——甜咸交织，油脂丰盈，带有淡淡的豆仁鲜感与轻微焦壳香。若烘焙曲线偏深，可出现更接近\"花生酱\"的膏体质感联想，甜感与咸感更加圆融。整体风味浓郁厚实，辨识度高，余味中有持久的烘烤坚果脂香与轻微的豆感。常见于日晒处理的巴西或越南中深度烘焙豆。","cause":"花生风味的核心呈香物质为2-乙酰基吡嗪（2-Acetylpyrazine）、2-甲基吡嗪、2-乙基吡嗪等吡嗪类化合物，由美拉德反应生成，赋予烘烤坚果香；咸鲜感与谷氨酸（Glutamic Acid）及少量游离氨基酸（在发酵处理中显著增加）有关；油脂丰盈感来源于大量的花生四烯酸氧化产物（醛酮类，如2-辛烯醛，2-Octenal）。日晒处理中，咖啡果浆中的蛋白质与糖分在高温发酵条件下产生丰富的美拉德前体，经烘焙后吡嗪类化合物含量显著提升，花生坚果香特征更加突出。"},{"id":149,"nameZh":"芝麻","nameEn":"Sesame","categoryId":4,"category":"坚果/可可 NUTTY/COCOA","description":"芝麻香气浓郁，常带烘烤、坚果油脂与轻微焦香联想（黑芝麻更深更厚）。","flavor":"芝麻风味在杯测中呈现为独特而浓郁的烘烤坚果香，带有强烈的脂香辨识度：类似将芝麻在干锅中翻炒至金黄飘香那一刻释放的气息——油润、深沉、坚果感饱满，略带轻微的焦香边缘；若参照黑芝麻，则香气更为厚重深邃，焦香感更强，带有隐约的土质温感。整体风味浓郁、穿透力强，甜感内敛，苦感适度，油脂感明显，余味中有持久的烘烤脂香与轻微的烟熏底调。常出现在深度烘焙的罗布斯塔豆或部分日晒处理的深度阿拉比卡豆中。","cause":"芝麻特征香气的核心物质为芝麻酚（Sesamol）与芝麻素（Sesamolin）的热降解产物，以及甲基吡嗪、二甲基吡嗪等吡嗪类化合物；油脂深香来源于芝麻中亚油酸的热氧化裂解产物（如2,4-癸二烯醛，2,4-Decadienal，具有强烈的油脂香气特征），在咖啡中类似路径由咖啡脂肪酸氧化产生；轻微焦香由糠醛、5-甲基糠醛及少量苯酚类化合物（Phenols，由绿原酸热解生成）贡献。深度烘焙条件下，高温促进吡嗪类化合物浓度升高及脂肪酸深度氧化，芝麻烘烤脂香特征更为突出。"},{"id":150,"nameZh":"开心果","nameEn":"Pistachio","categoryId":4,"category":"坚果/可可 NUTTY/COCOA","description":"开心果呈现细腻坚果脂香与淡淡甜感，常带轻微\"青坚果/奶油坚果\"气息。","flavor":"开心果风味在杯测中是坚果类香气中最为细腻、清新的一种：既不像核桃般深沉厚重，也不如花生般直接浓郁，而是呈现出一种介于青绿清新与奶油脂甜之间的精致坚果香——类似将新鲜开心果仁放在手心时散发的那种带有隐约绿意、淡淡奶甜与坚果脂香三重层次的复合气息。整体香气轻盈、清雅、甜感柔和，带有微微的奶油质感，余味中有淡淡的青坚果感与持久的甜脂余韵。常出现在浅中度烘焙的埃塞俄比亚水洗豆或厌氧发酵处理豆中。","cause":"开心果风味的清新青坚果调来源于（E）-2-己烯醛（Leaf Aldehyde，叶醛）与己醛（Hexanal）等C6醛类化合物（由亚麻酸的脂氧合酶途径或烘焙氧化裂解生成），赋予清绿感；奶油脂甜感来源于δ-癸内酯（δ-Decalactone）、γ-壬内酯（γ-Nonalactone）等内酯类及少量乙酸异戊酯（Isoamyl Acetate）；细腻坚果底香由低浓度2-甲基吡嗪、2,6-二甲基吡嗪贡献。厌氧发酵处理通过降低氧气浓度，促进脂肪酸通过厌氧代谢路径生成更多内酯类前体，浅度烘焙则有效保留C6醛类的清绿感，两者协同是开心果风味特征突出的关键工艺组合。"},{"id":151,"nameZh":"香料味","nameEn":"Spices","categoryId":9,"category":"香料味 SPICES","description":"香料味为大类词，概括辛香料带来的温暖、辛香、刺激或清新香气。","flavor":"香料味作为感官大类，涵盖从\"温暖甜香型\"（棕色香料：肉桂、丁香）到\"辛辣刺激型\"（胡椒、辣椒素方向）再到\"清新草本型\"（罗勒、香菜籽）的宽谱香气集合。在杯测中，\"香料感\"通常出现于干香（Fragrance）阶段最为突出，破渣（Break）时可释放出挥发性辛香分子；入口后香料风味多集中于口腔中后段及余韵，伴随温热感或轻微刺激感在鼻后通道（retronasal）持续涌现，是衡量咖啡复杂度与风土特征的重要维度之一。","cause":"香料味大类的呈香物质横跨多个化学家族——酚类化合物（如丁香酚 Eugenol、异丁香酚 Isoeugenol）赋予温暖辛香基底；萜烯类（如月桂烯 Myrcene、柠檬烯 Limonene、α-蒎烯 α-Pinene）贡献清新辛香；吡嗪类与烷基苯类化合物（源于美拉德反应/烘焙）带来烘烤辛香的深度感；有机硫化物极微量存在时可增强香料整体复杂度。发酵处理工艺（湿处理/蜜处理/厌氧发酵）中微生物代谢可富集香料前体物质，烘焙中高温热解进一步转化释放。"},{"id":152,"nameZh":"棕色香料","nameEn":"Brown Spice","categoryId":9,"category":"香料味 SPICES","description":"棕色香料常指偏温暖、烘焙甜香型的香料谱系（如肉桂、丁香、肉豆蔻等）之上位概括。","flavor":"棕色香料在感官上呈现出一种\"温暖怀抱感\"——类似于刚出炉的肉桂卷或节日热红酒的综合气息：入鼻时先感受到甜美、圆润、带有轻微木质底色的辛香，随后在口腔中段释放出温热感与奶油般的柔滑，尾韵悠长，带有轻微的树脂/香脂感。强度通常中等偏高，辛辣感柔和而非刺激。在精品咖啡杯测中，棕色香料往往是埃塞俄比亚原生种或日晒处理豆干香阶段中最令人印象深刻的复合香气之一。","cause":"棕色香料风味的核心物质为丁香酚（Eugenol）及其衍生物（β-甲基丁香酚、乙酰丁香酚），均属苯丙素类酚类化合物，阈值极低（咖啡液中检出浓度约 10–50 μg/kg）；肉桂醛（Cinnamaldehyde）贡献甜辛主体；异丁香酚（Isoeugenol）及 香草醛（Vanillin）增添奶油甜香底色。这类化合物在绿豆中以糖苷结合态存在，经烘焙热解（150–220°C 美拉德反应及热解反应阶段）释放游离态芳香分子；日晒及厌氧发酵处理可显著提升前体含量，进而放大棕色香料感知强度。"},{"id":153,"nameZh":"肉桂","nameEn":"Cinnamon","categoryId":9,"category":"香料味 SPICES","description":"肉桂呈现温暖、甜香料式的木质辛香，常与焦糖、巧克力、坚果烘烤香共现；在咖啡中多表现为\"甜香料感\"而非强烈辣感。","flavor":"肉桂风味在咖啡中的感知层次分明：干香阶段呈现出甜美、木质包裹的辛香，如同在温热的烤苹果或节日红茶上方轻嗅到的气息；湿香（Aroma）时辛香略为打开，甜感更为突出，类似肉桂糖霜或锡兰肉桂棒摩擦时的香气；入口后甜香料的温暖感从舌中段扩散至喉部，无明显刺激，尾韵中带有轻微的木质干感与隐约焦糖回甘。整体印象：温柔、圆融、甜美，辛辣阈值始终控制在舒适区间内。","cause":"肉桂风味的核心呈香物质为 反式肉桂醛（trans-Cinnamaldehyde）（阈值约 1.6 μg/L）及 邻甲氧基苯甲醛（o-Methoxybenzaldehyde）；丁香酚（共鸣性辅助）与 芳樟醇（Linalool）的协同作用使甜感更为柔和；2-甲氧基肉桂醛则贡献木质辛香层次。这些化合物在绿豆中以羟基肉桂酸衍生物（如绿原酸）为前体，经烘焙中期（约160–200°C）热解转化而来；浅烘焙时肉桂醛保留较好，深度烘焙则进一步降解为苯乙醛等产物使感知减弱。日晒发酵过程中微生物（乳酸菌/酵母）水解糖苷结合态前体，可预先富集游离肉桂醛浓度，解释了日晒埃塞豆肉桂感突出的现象。"},{"id":154,"nameZh":"肉豆蔻","nameEn":"Nutmeg","categoryId":9,"category":"香料味 SPICES","description":"肉豆蔻为温暖型甜香料，带轻微木质、坚果与粉感辛香；常被描述为\"烘焙甜香料、奶油香料\"方向的复合联想。","flavor":"肉豆蔻在咖啡中的存在感比肉桂更为低调、内敛，却极具辨识度：干香阶段呈现出类似刚磨碎的肉豆蔻粉末的温热气息，木质感与轻微的粉质感并存，没有锐利的刺激；湿香时甜感上扬，略带坚果油脂的圆润感，令人联想到加了现磨肉豆蔻的卡布奇诺或奶油布丁；入口后其风味在口腔中部以温暖、微粉的辛香晕染开来，与奶油质感或焦糖甜感高度协调，余韵干净且带有持续的温热感，极少有苦涩或收敛。","cause":"肉豆蔻风味的主要呈香物质为 肌醇（Myristicin，甲氧基黄樟脑）、榄香脂素（Elemicin）和 黄樟素（Safrole）等苯丙烯类化合物，以及萜烯类的 α-蒎烯（α-Pinene）、β-蒎烯和 月桂烯（Myrcene）（提供木质/松脂底色）；丁香酚微量存在增强辛香层次。在咖啡语境中，类肉豆蔻香气的形成与 4-乙烯基愈创木酚（4-Vinylguaiacol，4-VG）密切相关——该物质由阿魏酸（Ferulic acid）在发酵（微生物脱羧酶作用）及烘焙（热解脱羧）双重途径生成，是罗布斯塔与特定发酵处理阿拉比卡豆中肉豆蔻/丁香感的关键来源。"},{"id":155,"nameZh":"丁香","nameEn":"Clove","categoryId":9,"category":"香料味 SPICES","description":"丁香香气强烈、辛香偏药感与甜香并存，常带\"温暖、辛辣、略刺激\"的棕色香料特征（强度通常高于肉桂/肉豆蔻）。","flavor":"丁香在咖啡中是棕色香料谱系中穿透力最强的一员——干香阶段便可感受到强烈的辛香浮于杯口，类似中药丁香或牙科诊所中熟悉的丁香油气息，带有明显的药感底色；湿香阶段辛香稍被咖啡液的焦糖与酸质中和，展现出\"辛甜共鸣\"的特点，令人联想到印度香料茶（Masala Chai）或炖梨中的丁香角；入口后舌尖可感受到轻微的麻刺感（源于丁香酚对口腔神经末梢的轻度刺激），辛香在口腔中持续扩散，余韵偏长，带有树脂感与淡淡的苦辛尾调，整体印象厚重、强劲，是增添咖啡复杂度与个性的重要维度。","cause":"丁香风味的绝对核心物质为 丁香酚（Eugenol），占丁香精油总量约70–90%，阈值极低（约6 μg/kg），在咖啡中的检出浓度为 5–30 μg/kg，是引发\"丁香/辛香/药感\"感知的直接来源；乙酰丁香酚（Acetyl Eugenol）赋予更甜美圆润的丁香变奏；β-石竹烯（β-Caryophyllene，倍半萜类）贡献辛香的木质辛辣底色并在口腔产生轻微麻刺感。丁香酚在咖啡中主要来源于两条路径：① 绿豆中木质素/黄酮类前体在烘焙热解（>180°C）时生成；② 厌氧发酵/蜜处理工艺中，特定微生物（尤其是 *Lactobacillus* 属）通过羟基肉桂酸途径代谢生成丁香酚前体，导致该类处理豆丁香感显著增强。"},{"id":156,"nameZh":"胡椒","nameEn":"Pepper","categoryId":9,"category":"香料味 SPICES","description":"胡椒为辛香料总称，可指黑胡椒/白胡椒等带来的辛香与轻刺激感。","flavor":"胡椒风味作为大类概念，在咖啡感官中代表一种\"干辛\"属性——既不同于肉桂/丁香的甜暖感，也区别于辣椒的热辣灼烧感，而是呈现出清冽、锐利、略带木质的辛香刺激。在杯测中，胡椒感通常于破渣后的湿香阶段出现，随蒸汽携带出挥发性辛香分子，入鼻后在鼻腔中段产生轻微的辛辣刺激感；入口后胡椒的辛感多落于舌根与上颚之间，与余韵中的苦涩或酸质相互作用，可产生令人愉悦的复杂感或\"活跃度\"（vibrancy），是评估咖啡结构感与个性的重要风味指标。","cause":"咖啡中类胡椒辛香的呈香物质主要来自 萜烯类化合物：α-蒎烯（α-Pinene）、β-蒎烯（β-Pinene）、3-蒈烯（3-Carene）及 β-石竹烯（β-Caryophyllene）构成辛香的基础骨架；微量的 胡椒碱（Piperine）（生物碱类）虽在咖啡中含量极低，但可能通过与口腔 TRPV1 受体的弱激活带来轻微辛辣感知。烘焙过程中，萜烯类化合物在中等烘焙度（一爆至二爆初）浓度较高，深烘则因高温挥发损失明显；高海拔产区（如危地马拉、肯尼亚）绿豆中萜烯类前体含量更丰富，是胡椒风味感知较强的产地基础。"},{"id":157,"nameZh":"黑胡椒","nameEn":"Black Pepper","categoryId":9,"category":"香料味 SPICES","description":"黑胡椒呈现更明确的辛香、轻木质与刺激感，常在余韵或吞咽后更明显。","flavor":"相较于\"胡椒\"大类的概括性，黑胡椒在感官上有极强的个性标签：干香阶段即可捕捉到一股清晰、干燥的辛香，如同将整粒黑胡椒研磨入杯的瞬间气息——锐利、木质、略带土感，但完全没有厚重感；湿香时辛香分子随热气充分打开，呈现出令人振奋的\"干辛清冽\"质感；入口后，黑胡椒的辛感从舌侧缓缓蔓延至喉部，在吞咽后的鼻后通道（retronasal）中更为显著，产生一种绵延而节制的辛辣余热，整体感知干净、有棱角，是高海拔精品豆（尤其是水洗处理）展现矿物感与活力的风味佐证之一。","cause":"黑胡椒风味的化学本质在于 萜烯类精油组分，尤其是 β-石竹烯（β-Caryophyllene）——这是黑胡椒精油的主要成分（含量约10–35%），在咖啡中已被GC-MS检出；α-蒎烯、β-蒎烯、柠檬烯（Limonene）共同提供清新辛木底色；胡椒碱（Piperine）作为黑胡椒标志性生物碱，在真正胡椒中含量5–9%，在咖啡中仅以痕量存在但可能参与口腔刺激感的叠加效应（TRPV1/TRPA1通道激活）。烘焙阶段一爆前后（约190–200°C）萜烯类挥发物峰值出现，此时中浅烘焙豆的黑胡椒感知最为突出；日晒干燥过程中果皮中萜烯类前体的缓慢释放，也可在成品豆中形成更丰富的辛香轮廓。"},{"id":158,"nameZh":"辛辣味","nameEn":"Pungent","categoryId":9,"category":"香料味 SPICES","description":"辛辣味指刺激性较强、带\"冲鼻/刺感\"的香气与口感特征。","flavor":"\"Pungent\"在 WCR 感官词典中被定义为一种高强度、令鼻腔与口腔产生明显刺激性感知的复合属性。在咖啡中，辛辣味并非单一风味物质的贡献，而是多种挥发性化合物的协同峰值效应：鼻闻时产生强烈的\"冲鼻感\"，类似高浓度醋酸或新鲜辣根的刺激性挥发气息，有时伴随轻微的灼热感或催泪感；入口后舌面、上颚可感受到明显的刺激性收敛，唾液分泌轻度增加，喉部有短暂灼热感，余韵中留有辛辣的干燥感。在精品咖啡评鉴中，适度的辛辣感可增加咖啡的\"活力\"与\"复杂度\"，但过强则视为缺陷（Defect），与发酵过度或低质量生豆相关。","cause":"辛辣味的主要呈味物质跨越多个化学类别：① 挥发性有机酸（如乙酸 Acetic acid、丙酸 Propionic acid）在高浓度下贡献尖锐的刺激性香气，是发酵过度的标志物；② 醛类（如乙醛 Acetaldehyde、糠醛 Furfural）以高浓度存在时产生鼻腔刺激感；③ 酚类化合物（如苯酚 Phenol、邻甲酚 o-Cresol、愈创木酚 Guaiacol）在深烘或烟感豆中浓度升高，产生辛辣-烟熏刺激感；④ 极微量的 含硫化合物（如二甲基硫 Dimethyl Sulfide, DMS；二甲基二硫 DMDS）以高于阈值数倍浓度出现时，产生刺鼻辛辣感（通常与发酵缺陷或Quakers豆相关）。愈创木酚等酚类物质主要源于木质素在烘焙高温下的热解（>200°C），发酵产生的挥发酸则与酵母及异型发酵细菌的代谢活动密切相关。"},{"id":159,"nameZh":"罗勒","nameEn":"Basil","categoryId":9,"category":"香料味 SPICES","description":"罗勒为芳香草本植物，香气清新，兼具草本与轻辛香。","flavor":"罗勒在咖啡中的出现往往令人惊喜而微妙——它不以强烈取胜，而以清新独特的草本辛香留存感知：干香阶段略带甜美的绿色草本气息，类似刚掐断的新鲜罗勒叶或罗勒精油的前调；湿香时清凉感与微弱的辛香辐射开来，令人联想到意大利青酱（Pesto）或罗勒薄荷茶的复合气息；入口后草本清新感多以\"绿色感\"的形式在口腔中段短暂出现，不带涩感，过渡流畅，尾韵留有轻微的芳香草本回味。该风味特征在日晒或厌氧发酵处理的精品豆（尤其是埃塞俄比亚与哥伦比亚产区）中偶有报道，是花香-草本连续谱上的重要节点。","cause":"罗勒风味的核心呈香物质为 芳樟醇（Linalool）——这也是咖啡中最重要的单萜醇之一，在埃塞俄比亚原生种中含量尤为丰富；1,8-桉叶素（1,8-Cineole，桉叶脑）贡献清凉草本感；甲基醚蒌叶酚（Methyl chavicol，Estragole）是甜罗勒精油的特征成分，贡献类茴香/罗勒的甜草本气息；芳香醇类（如 α-松油醇 α-Terpineol）增强清新花香草本层次。这些萜烯醇类化合物在咖啡生豆中以游离态及糖苷结合态共存，浅烘至中烘时保留较好，酶处理工艺（如CO₂浸渍/厌氧发酵）可通过糖苷酶水解释放更多游离态芳樟醇，显著增强成品豆的草本-花香-辛香复合感知。"},{"id":160,"nameZh":"香菜籽","nameEn":"Coriander Seed","categoryId":9,"category":"香料味 SPICES","description":"香菜籽常带柑橘、草本与轻辛香特征，在咖啡里多表现为清新辛香而非厚重甜香料。","flavor":"香菜籽（注意区分于香菜叶的\"肥皂/臭青感\"）在感官上是清新、柑橘质感与草本辛香的迷人组合：干香阶段展现出一种干燥、微甜的柑橘辛香，如同将整颗香菜籽在手心轻轻揉碎的瞬间气息，兼具柠檬皮与辛木的双重信息；湿香时柑橘感更为突出，辛香退为背景，整体香气轮廓明亮清新；入口后清新感在舌面前端与两侧绽放，草本辛香在中段接力，余韵温和，带有轻微的干燥感与持久的橙香回味。该风味在肯尼亚、哥伦比亚及埃塞俄比亚水洗豆中较为常见，是\"柑橘辛香型\"精品豆的典型感官标签之一。","cause":"香菜籽风味的主要呈香物质为 芳樟醇（Linalool）（香菜籽精油中占60–80%，兼具花香-柑橘-草本三重属性，阈值约6 μg/L）；乙酸芳樟酯（Linalyl Acetate）贡献甜美的花香-柑橘酯香；α-蒎烯、月桂烯（Myrcene）、对异丙基甲苯（p-Cymene）提供辛木-柑橘底色；微量的 癸醛（Decanal）强化橙皮感。在咖啡中，芳樟醇是绿豆中含量最丰富的萜烯醇之一，其浓度受品种（原生种 > 现代杂交种）、海拔（高海拔合成更多）及处理工艺影响显著；厌氧/碳酸浸渍（CM）发酵过程中β-糖苷酶活性增强，大量释放结合态芳樟醇，是该处理法香菜籽/花香感突出的直接化学机制。"},{"id":161,"nameZh":"茴香","nameEn":"Fennel","categoryId":9,"category":"香料味 SPICES","description":"茴香香气介于草本与甘甜香料之间，常带轻微甘草样的甜香料联想。","flavor":"茴香在咖啡风味谱中是一个独特的\"桥梁型\"存在——它同时连接着甜香料（肉桂/八角方向）与草本清新（罗勒/香菜方向）两个极点，本身呈现出一种柔和、甘甜、带有轻微清凉感的辛香：干香阶段闻来令人联想到茴香籽茶或法国苦艾酒的甜草药气息，甘草样的甜感清晰但不厚重；湿香时茴香的清凉感略有提升，甜药草香优雅散开；入口后甜感先于辛香抵达舌尖，随后以一种轻柔、略带凉意的方式在口腔中缓慢铺展，余韵带有明显的甘草甜回味，整体印象优雅而具个性，令人联想到天气清凉时一杯精心调制的草本咖啡饮品。该风味在特定日晒埃塞俄比亚豆（尤其是西达摩、耶加雪菲）或经特殊厌氧发酵处理的豆款中偶有报道。","cause":"茴香风味的决定性呈香物质为 反式茴香脑（trans-Anethole）——茴香精油的主要成分（占70–90%），贡献标志性的甘草-甜茴香气息，阈值约 0.05 mg/kg（极低），在咖啡中以痕量-微量水平即可产生显著感知；甲基醚蒌叶酚（Estragole/Methyl chavicol）贡献草本甜辛的辅助调性；小茴香醇（Fenchol）及 莳萝醚（Dillapiole）增加草本清新层次；微量的 α-水芹烯（α-Phellandrene）提供清凉草本辛香底色。在咖啡生产语境中，茴香样风味的出现与 发酵工艺的精准调控高度相关：长时间低温厌氧发酵可诱导特定酵母菌株（如 *Pichia* 属）代谢产生茴香脑前体物质；烘焙中浅至中度（一爆密集期前后）时这类萜烯类物质的保留率最高，过度烘焙会使其迅速氧化降解，导致茴香特征消失。"},{"id":162,"nameZh":"烘烤味","nameEn":"Roasted","categoryId":2,"category":"烘烤味 ROASTED","description":"烘烤味为大类词，用于概括咖啡烘焙带来的烘烤、焦香与谷物化风味谱系。","flavor":"烘烤味是咖啡经高温处理后形成的复合风味大类，涵盖从轻度谷物烘烤到深度焦炭化的整个连续谱系。在杯测语境中，\"烘烤味\"通常呈现为一种干燥、温暖、具有厚重感的嗅觉底色——如刚出炉的全麦面包皮、热炒芝麻或深度烘焙坚果的混合气息。在口腔中，它往往与苦味深度交织，在中段带来厚实饱满的质感，余韵呈现出干燥的焦香与微弱的烟熏感。这一大类风味是咖啡区别于其他饮品的核心特征之一，其强度直接映射烘焙程度。","cause":"烘烤味大类风味的核心驱动力是美拉德反应（Maillard Reaction）与焦糖化反应（Caramelization），两者在140–230°C的烘焙区间内协同发生。美拉德反应中氨基酸与还原糖缩合生成大量杂环类化合物：吡嗪类（Pyrazines，如2-甲基吡嗪、2,3-二甲基吡嗪）贡献坚果烤香；呋喃类（Furans，如糠醛Furfural、5-甲基糠醛）提供焦糖-烤面包气息；吡咯类（Pyrroles，如2-乙酰基吡咯）赋予温暖的烘焙底调。焦糖化反应分解蔗糖生成二乙酰（Diacetyl）和乙偶姻（Acetoin）等羰基化合物，叠加甜润烘烤感。整体\"烘烤味\"的感知强度与烘焙温度-时间曲线（RoR）高度相关，是烘焙工艺质量的综合感官反映。"},{"id":163,"nameZh":"谷物","nameEn":"Cereal","categoryId":2,"category":"烘烤味 ROASTED","description":"谷物联想常指麦片、燕麦、谷物早餐的干香与淀粉甜感。","flavor":"在干嗅阶段，谷物风味呈现为类似刚开封的燕麦片、全麦麦片或谷物早餐（如Weetabix）的朴素干香，带有轻柔的淀粉甜感与微微的稻壳清香。湿嗅后这种气息变得更加温润，类似温热的燕麦粥或刚冲泡的谷物茶。在口腔中，谷物感常以一种\"干净的粮食甜\"呈现在中段风味，质地轻盈，余韵短促，整体印象朴实、圆润，无尖锐刺激感。在浅烘豆中，此风味常与坚果或麦芽调性并存，是评判咖啡烘焙完成度的重要指标之一。","cause":"谷物风味的核心呈香物质为2-乙酰基-1-吡咯啉（2-Acetyl-1-pyrroline，简称2-AP），这是爆米花、米饭及面包皮香气的共同标志性成分，经美拉德反应由脯氨酸（Proline）与还原糖在中温段（约140–160°C）生成。此外，糠醛（Furfural）和5-甲基糠醛（5-Methylfurfural）由戊糖热降解产生，贡献烤谷物的甜香底调；2-乙酰基呋喃（2-Acetylfuran）则提供类似烤麦片的坚果-谷物复合香。咖啡在烘焙前期（一爆前）淀粉与纤维素的热降解也会释放少量乙醛（Acetaldehyde）和丙醛（Propanal），增添谷物的新鲜粮食感。浅烘焙或轻度发展阶段最易捕捉到这类纯粹的谷物风味。"},{"id":164,"nameZh":"焦味","nameEn":"Burnt","categoryId":2,"category":"烘烤味 ROASTED","description":"焦味指烘烤过度或接近烧焦产生的焦糊气息，是烘烤类中更强烈的方向。","flavor":"焦味是一种强度鲜明、边界清晰的负向烘烤风味，在干嗅时呈现为烤糊的面包皮、碳化坚果壳或过度烤制的肉类焦皮的刺激性气息。湿嗅后这种气味更为浓烈，带有苦涩、辛辣的前调。在口腔中，焦味通常与高强度苦味深度融合，在口腔后段形成持久的焦苦余韵，并在舌根与软腭处留下干燥、灼烧般的收敛感。与\"碳化味\"相比，焦味更侧重于气味层面的直接刺激，而非深层的炭化质感。在杯测评估中，明显的焦味通常被判定为烘焙缺陷（Roast Defect），对杯测得分有显著负向影响。","cause":"焦味的核心呈香物质是酚类化合物，主要包括愈创木酚（Guaiacol）和4-甲基愈创木酚（4-Methylguaiacol）——二者由咖啡中大量存在的绿原酸（Chlorogenic Acids）在高温（>200°C）裂解降解时生成，赋予焦糊、苯酚样的刺鼻气息。苯酚（Phenol）本身也在过度烘焙时大量积累，带来更为直接的焦苦气味。此外，糠醛（Furfural）在高温下进一步聚合缩合形成深色聚合物（HMF聚合体），强化焦苦感；乙醇醛（Glycolaldehyde）的热降解产物也参与焦味构建。这类化合物的浓度与烘焙温度及时间呈正相关，是深度烘焙（French/Italian Roast）的典型化学标志。"},{"id":165,"nameZh":"烟草","nameEn":"Tobacco","categoryId":2,"category":"烘烤味 ROASTED","description":"烟草联想常用于描述干燥烟叶、雪茄盒或烟草香气的成熟气息。","flavor":"烟草风味在咖啡杯测中呈现为干燥、成熟、略带木质与皮革感的复合气息，类似打开一盒陈年雪茄或晒干烟叶时散逸的气味——带有温暖的粗糙感，而非刺鼻的烟雾气。在干嗅阶段，这种气息内敛而深沉，透着淡淡的发酵甜感；湿嗅后层次展开，木质调与干花香（如干玫瑰、干鸢尾）浮现。在口腔中，烟草调通常伴随中等偏低的酸度、厚实的醇厚度（Body）和绵长的干燥余韵，整体给人一种\"成熟、深沉、有质感\"的感官印象。这一风味在深烘或经过特殊干处理的豆子中较为常见，也常见于部分阿拉比卡老树种（如埃塞俄比亚原生种）的大地调性中。","cause":"咖啡中烟草风味的主要贡献物质为降异戊二烯类（Norisoprenoids），尤其是β-大马酮（β-Damascenone）和β-紫罗酮（β-Ionone）——这类化合物由类胡萝卜素（Carotenoids）在烘焙热降解中生成，赋予烟草中标志性的花-木-枯叶复合气息。3-乙基吡啶（3-Ethylpyridine）和2-乙酰基吡啶（2-Acetylpyridine）是烟草中已被鉴定的特征含氮杂环化合物，经美拉德反应在中高温烘焙中生成，贡献干燥烟草香。此外，巨豆三烯酮（Megastigmatrienone）类化合物是卷烟烟草香气的重要组成部分，在深烘咖啡中也有微量检出。发酵处理工艺（特别是日晒/蜜处理）中微生物对前体物质的转化，也会增加此类降异戊二烯类化合物的含量，进一步强化烟草调性。"},{"id":166,"nameZh":"烟丝","nameEn":"Pipe Tobacco","categoryId":2,"category":"烘烤味 ROASTED","description":"烟丝更强调烟斗烟草的甜润、发酵与木质复合香。","flavor":"烟丝（烟斗烟草）风味比普通烟草香更为甜润、柔和，充满发酵带来的复杂感。在嗅觉层面，它类似打开一罐经过熟化的烟斗烟草时散发的气息——温暖的枫糖蜜感、轻柔的木质底调与淡淡的花香融为一体，并带有隐约的皮革或香草调。在口腔中，这种风味通常与圆润饱满的醇厚度（Full Body）相伴，在中后段呈现出微甜、柔润的余韵，无明显刺激感。相较于\"烟草\"的干燥与内敛，烟丝风味层次更丰富，更具愉悦感，通常被视为复杂度的正向加分项，尤其在日晒处理的浓郁风格咖啡中偶有出现。","cause":"烟丝的甜润复杂香来源于多重化合物的协同作用。苯乙醛（Phenylacetaldehyde）由苯丙氨酸（Phenylalanine）经Strecker降解产生，赋予蜂蜜-烟草甜香；2-甲氧基-4-乙烯基苯酚（2-Methoxy-4-vinylphenol，即4-乙烯基愈创木酚）由阿魏酸热裂解生成，带来木质辛香甜调，是烟斗烟草复合香的重要组成部分。β-大马酮（β-Damascenone）持续贡献花果-烟草底调；在发酵过程中，微生物（尤其是酵母菌）催化糖苷水解释放出里那醇（Linalool）和香叶醇（Geraniol）等花香萜烯，与木质-烟草调性叠合，形成\"熟化烟丝\"的特征复合香。湿处理后期或厌氧发酵咖啡豆中，这类物质的比例通常更高。"},{"id":167,"nameZh":"稻谷","nameEn":"Grain","categoryId":2,"category":"烘烤味 ROASTED","description":"稻谷/谷粒联想指更接近\"谷粒本体\"的粮香、谷壳与淀粉气息。","flavor":"稻谷风味在感官上比\"谷物\"更原始、更粗粝，类似晒干的稻谷堆旁散发的粮仓气息，或将生米放入掌心搓热后释放的谷壳淀粉香。在干嗅阶段，这种气息带有明显的干燥感、轻微的尘土感与木质纤维感，几乎不含甜感；湿嗅后，淡淡的湿米香与糊化淀粉气息浮现。在口腔中，稻谷风味通常以一种\"空白的、干净的\"方式存在于中段，无明显酸味和甜味，余韵短暂且干燥。它常见于烘焙发展不足的咖啡（Underdeveloped Roast）中，是杯测中判断豆子烘焙完成度的重要感官信号。","cause":"稻谷/谷粒气息的核心物质是2-乙酰基-1-吡咯啉（2-AP）（参见\"谷物\"词条），但在稻谷联想中，己醛（Hexanal）和壬醛（Nonanal）这类C6–C9脂肪醛的作用更为突出——这些化合物由不饱和脂肪酸（亚油酸、亚麻酸）在轻度氧化或热降解中产生，赋予典型的\"生粮/谷壳\"青涩气息。4-乙烯基愈创木酚（4-Vinylguaiacol）在低浓度时也可贡献谷壳木质感。当烘焙发展不充分时（豆芯未完全熟透），生豆中残余的有机酸和多糖前体未能充分转化，导致这类脂肪醛及淀粉降解产物比例偏高，在杯中呈现出明显的生谷物/稻谷气息，通常被视为烘焙缺陷（Baked/Underdeveloped）的感官指征。"},{"id":168,"nameZh":"棕色","nameEn":"Brown","categoryId":2,"category":"烘烤味 ROASTED","description":"棕色（Brown）在烘烤类中常用于描述\"褐变反应带来的暖色烘焙气息\"。","flavor":"棕色风味是一种高度综合性的感官描述符，对应视觉-嗅觉-味觉的联觉印象：嗅觉上类似刚烤好的全麦面包片、深色蜂蜜或焦糖布丁的表面——温暖、甜润、带有适度的干燥感，没有刺鼻的焦苦；味觉上表现为圆润的甜苦平衡，在中段产生令人愉悦的暖感，余韵中透出焦糖与坚果的烤香尾调。这种风味常被感官评估者用来描述\"中度烘焙\"的典型风味状态，是美拉德反应进行到理想程度的感官呈现，既无生豆的青涩，也无过烘的焦苦，整体平衡而饱满。","cause":"棕色风味的形成核心是美拉德反应褐变路径与焦糖化反应的最佳平衡态。在180–210°C区间，美拉德反应产生大量含氮杂环化合物，尤其是烷基吡嗪类（Alkylpyrazines，如2,5-二甲基吡嗪、2-乙基-3-甲基吡嗪），贡献坚果-烘烤的暖香主调。5-羟甲基糠醛（HMF，5-Hydroxymethylfurfural）由蔗糖在中温焦糖化中生成，赋予焦糖甜感。麦芽醇（Maltol）和乙基麦芽醇（Ethyl Maltol）是该阶段最具代表性的甜烤风味物质，呈现焦糖面包的典型\"棕色香甜\"。类黑素（Melanoidins）这类高分子褐变聚合物的形成也与棕色感官印象直接相关，它们在赋予视觉深棕色的同时，也为杯中的醇厚感与回甜提供物质基础。"},{"id":169,"nameZh":"烘烤","nameEn":"Roast","categoryId":2,"category":"烘烤味 ROASTED","description":"烘烤（Roast）指更具体的\"烘焙香\"本身，用于描述烘焙带来的香气主导程度。","flavor":"作为独立感官描述词，\"烘烤\"指向一种纯粹、集中且高辨识度的烘焙香气——类似热炉膛旁的干燥热气、新鲜出炉咖啡豆冷却时散逸的浓郁炒香，以及在研磨刹那迸发的那股温暖而厚重的烘焙香气爆破感。在嗅觉层面，\"烘烤\"香是直接的、干燥的、具有存在感的，无明显酸感或果香的干扰。在口腔中，它常与中高强度的苦味共存，在中后段以干燥焦香收尾，余韵中能感受到一种\"热度残留\"的感觉。这一描述符在杯测中用于定位烘焙香在整体风味中的主导程度，是量化烘焙风格（浅/中/深）的重要感官坐标。","cause":"咖啡\"烘烤香\"的核心贡献化合物按OAV（气味活度值）排序，糠基硫醇（Furfurylthiol，2-Furfurylmercaptan）通常位居榜首，其极低阈值（0.01 ppb）使其成为烘焙咖啡最标志性的香气分子，提供强烈的\"鲜烤咖啡\"特征气息。2-甲基吡嗪（2-Methylpyrazine）与2,3-丁二酮（Diacetyl）组合构建烘烤-黄油底调；甲硫基丙醛（Methional）由蛋氨酸（Methionine）经Strecker降解产生，贡献熟土豆-烘烤的复合气息；乙酰基呋喃（Acetylfuran）则提供烤面包-咖啡的干香基调。这些化合物大量生成于烘焙一爆（First Crack）前后（约196–205°C），是判断烘焙风味发展（Roast Development）完成与否的关键化学窗口。"},{"id":170,"nameZh":"灰烬味","nameEn":"Ashy","categoryId":2,"category":"烘烤味 ROASTED","description":"灰烬味指类似烟灰、炉灰的干燥粉灰气息，通常为不理想的烘烤副产物联想。","flavor":"灰烬味呈现为一种干燥、粉质、无生命感的气息，类似用手指触碰冷却后的炉灰时的气味，或是嗅闻熄灭后的烛芯——没有烟熏的温暖，也没有焦糖的甜蜜，只有一种令人不悦的干燥、空洞的粉末质感。在口腔中，灰烬感常以\"口腔干涩\"\"覆盖一层薄粉\"的方式出现，舌面会感受到明显的干燥收敛，并伴随苦涩的余韵，仿佛咬到了一粒细沙。这种风味在重度过烘的咖啡或萃取不当（如过度萃取）的意式浓缩中较为常见，对整体杯测评分有明显的负面拖累。","cause":"灰烬味（Ashy）的主要化学根源是高温热裂解产生的酚类化合物和含硫化合物的组合。苯酚（Phenol）和邻甲酚（o-Cresol）在较高浓度时呈现典型的烟灰-药品-消毒水气息，当绿原酸在>220°C的过度烘焙条件下大量降解时，这类化合物的浓度会显著超过其风味阈值（约0.02–0.09 ppm）。2-甲氧基苯酚（Guaiacol）在超高浓度时也会从\"烟熏香\"转变为令人不快的\"炉灰感\"。此外，碳化多糖残留物（类似活性炭的大分子结构）在口腔中产生吸附性干涩感，与灰烬质感直接相关。过度烘焙导致的咖啡酸（Caffeic Acid）氧化聚合物也会加重这种感官印象。"},{"id":171,"nameZh":"辛酸味","nameEn":"Acrid","categoryId":2,"category":"烘烤味 ROASTED","description":"辛酸味指刺鼻、呛鼻的刺激性气味，常与过度烘烤或不洁净烟焦有关。","flavor":"辛酸味是烘烤类风味中最为不愉悦的极端表现之一，呈现为一种刺鼻、呛喉、近乎辛辣的感官冲击。在嗅觉上，它类似燃烧橡胶、塑料或焦糖被高温完全炭化时产生的刺激性烟气——锋利而持久，能引发轻微的鼻腔灼烧感或咳嗽反射。在口腔中，辛酸感以高强度苦涩、强烈的收敛性和明显的化学刺激感表现，在舌根处形成长时间不散的焦苦灼感，余韵极为持久且令人不快。这种风味在严重过度烘焙（>230°C长时间）或使用劣质豆（高缺陷率）时出现，是杯测评分的重大减分项。","cause":"辛酸味（Acrid）由多类高浓度刺激性化合物协同产生。吡啶类化合物（Pyridines，如吡啶Pyridine、3-甲基吡啶）是主要贡献者，由氨基酸与糖类在高温（>200°C）发生Maillard反应的晚期阶段大量生成，提供刺鼻的辛辣呛感。丙烯醛（Acrolein）是甘油及不饱和脂肪酸在高温降解时的产物，具有极强的刺激性和催泪效果，即便微量存在也会显著提升辛酸感。乙醛（Acetaldehyde）和甲醛（Formaldehyde）在极度过烘条件下也会从碳水化合物裂解中产生，进一步叠加刺激感。高分子量美拉德反应末端产物（AGEs）的苦涩味受体结合也是口腔辛苦感的来源之一。这些化合物均与烘焙终点温度超标及发展时间过长密切相关。"},{"id":172,"nameZh":"碳化味","nameEn":"Charred","categoryId":2,"category":"烘烤味 ROASTED","description":"碳化味指接近炭烤、表面碳化后的气息，比一般烘烤更深、更黑。","flavor":"碳化味是烘烤风味谱系中最深沉、最接近\"纯碳\"的感官描述，类似将木炭点燃时的即时气息，或将牛排烤至完全焦黑表面后贴近闻到的那种干燥、黑色、纯粹的炭化气味。与\"焦味（Burnt）\"的刺激性相比，碳化味更为沉稳、干燥，少了刺鼻感，多了一种\"纯粹黑暗\"的质感。在口腔中，这种风味以深沉的干苦展开，无明显酸感，黑巧克力般的苦味迅速转为干燥的木炭余韵，质感粗粝，收敛性强。深度烘焙（Full City+至French Roast）的特定风格中，轻微的碳化感有时被视为风格化表达，但超出一定阈值即成为缺陷。","cause":"碳化味（Charred）的形成机制是咖啡豆有机物在高温下发生热裂解（Pyrolysis），细胞结构开始物理性炭化。主要呈香物质包括：糠醛聚合物与HMF衍生物——糠醛（Furfural）在>200°C时聚合生成深色、具有炭香的聚合体；挥发性酚类（Volatile Phenols）——尤其是4-乙烯基苯酚（4-Vinylphenol）和苯酚（Phenol）在高浓度下产生焦炭类气息；多环芳烃类（PAHs）（如微量苯并芘）在极度过烘时可能生成，赋予典型炭化气息（同时也是健康风险的关注点）。木质素（Lignin）裂解产物——咖啡豆细胞壁的木质素在>220°C剧烈热降解，释放出大量酚醛类衍生物，构成碳化味的结构性底调。这一过程在深烘豆的外壳层比豆芯发生得更早，导致表面碳化感的感官不均匀性。"},{"id":173,"nameZh":"烧焦味","nameEn":"Scorched","categoryId":2,"category":"烘烤味 ROASTED","description":"烧焦味指局部受热过猛产生的焦糊气息，可出现在烘焙或制作过程的高温接触中。","flavor":"烧焦味（Scorched）的独特之处在于其\"局部性\"与\"接触性\"——它不是整体过烘的均匀焦苦，而更像是锅底烧干后附着的那层焦皮气息，或是咖啡粉与过热金属接触瞬间产生的\"贴底焦\"。在嗅觉上，烧焦味呈现为尖锐、突兀的焦糊气息，有时带有微弱的硫磺感或橡胶感，与整体香气格格不入。在口腔中，这种风味以不规则的方式呈现——时而突然冒出的焦苦峰值，时而是一种弥散于中后段的干燥焦涩，余韵中带有令人不适的烟苦。它是典型的工艺缺陷标志，多见于烘焙机滚筒火力分布不均、进豆量过大、或意式机锅炉接触面过热等情况。","cause":"烧焦味（Scorched）的化学成因与局部热点温度过高直接相关，其主导物质为：吡嗪类化合物的过度积累（Over-production of Pyrazines）——当豆子局部温度骤升时，吡嗪生成速率远超正常值，导致浓烈的苦焦感；丙酮醛（Methylglyoxal）和乙二醛（Glyoxal）作为美拉德反应过度进行的中间体大量累积，产生刺鼻的焦糊气息；分解的蔗糖焦糖化末端产物在局部高温下过度聚合，生成苦涩的焦糖素（Caramelin）和脱水山梨糖醇聚合体。此外，豆体表面的阿魏酸（Ferulic Acid）在局部过热点迅速裂解为高浓度的4-乙烯基愈创木酚和苯酚，产生烟焦刺激感。这些变化均与烘焙机火力控制失当、豆体受热不均匀密切相关。"},{"id":174,"nameZh":"焦炭味","nameEn":"Charcoal","categoryId":2,"category":"烘烤味 ROASTED","description":"焦炭味指木炭/炭火的气息联想，常带干燥、黑色烘烤与烟焦感。","flavor":"焦炭味是烘烤类风味中最\"干\"、最\"黑\"的极端描述，类似在炭火烤炉旁嗅到的那种无烟、纯粹的炭火气息——不同于烟熏的湿润感，焦炭味是干燥的、矿物质感的、带有轻微金属感的深色嗅觉体验。在口腔中，焦炭调以极为持久的干苦主导，完全压制了甜感和酸感，在口腔中留下类似咬过木炭后的干涩感与粗矿感，余韵可以持续数分钟而不消散。这种风味在极深烘焙（Italian Roast及以上）中偶尔以\"风格化\"方式出现，但在精品咖啡评估语境中几乎毫无例外地被认定为负面缺陷（Fault/Defect）。","cause":"焦炭味（Charcoal）的化学本质接近有机物热裂解的最终阶段。多环芳香烃类（PAHs，Polycyclic Aromatic Hydrocarbons）——如苯并芘（Benzopyrene）、萘（Naphthalene）等，在咖啡豆炭化程度极深时可微量检出，带来典型的沥青-焦炭气息；挥发性炭粒结合态酚类——炭化表面的微细颗粒吸附了大量酚类化合物，在饮用时以浓缩形式释放，形成矿物-炭苦感；碳酸钾（Potassium Carbonate）——深烘豆中钾元素的氧化产物在水中形成弱碱性环境，叠加口腔的干涩矿物感；高聚合度类黑素（High-MW Melanoidins）作为大分子苦味载体，在深烘中大量积累，是焦炭苦涩感的主要味觉来源。以上物质均形成于烘焙终点温度极高（>235°C）且发展时间过长的条件下。"},{"id":175,"nameZh":"烟熏木味","nameEn":"Smoked Wood","categoryId":2,"category":"烘烤味 ROASTED","description":"烟熏木味指木材烟熏带来的木质与烟香复合气息，比单纯\"烟熏\"更强调木材感。","flavor":"烟熏木味是一种层次丰富、具有强烈空间感的复合风味，类似坐在燃烧橡木或柚木的壁炉旁时，空气中弥漫的那种温暖的木质烟香——木材的树脂感、烟气的飘逸感与轻微的焦糖化甜感交融在一起，形成令人联想到户外营地烤火或威士忌橡木桶的独特气息。与单纯\"烟熏\"相比，烟熏木味有明显的木质结构感（类似雪松、橡木或胡桃木的纤维感），而非单纯的烟气漂浮感。在口腔中，这种风味常与中高醇厚度相伴，余韵悠长，呈现出干燥木质与轻微树脂的收尾，适当存在时增添复杂度，过量则会压制其他细腻风味。","cause":"烟熏木味（Smoked Wood）的核心化学成分为木质素（Lignin）及半纤维素的热降解挥发酚类，主要包括：愈创木酚（Guaiacol）——由木质素中丁香基单元热解产生，是木质烟熏香的最重要标志物（阈值约3 ppb）；4-甲基愈创木酚（4-Methylguaiacol）赋予更甜润的烟熏木香；丁香酚（Eugenol）提供丁香-木质辛香；丁香醛（Syringaldehyde）和香兰素（Vanillin）由木质素中紫丁香基单元热解产生，叠加木质甜香底调。当咖啡烘焙时，豆体细胞壁的木质素（约占细胞壁干重2–3%）发生热降解，释放以上酚类物质；某些自然处理（Sun-dried）豆子因带壳干燥导致果木气息渗入豆体，也会增强这类烟熏木质风味的前体物质比例。"},{"id":176,"nameZh":"微焦味","nameEn":"Slightly Burnt","categoryId":2,"category":"烘烤味 ROASTED","description":"微焦味指轻度焦香，强度低于焦味/烧焦味，常用于更细腻的烘烤程度表达。","flavor":"微焦味是烘烤风味谱中最接近\"可控美感\"边界的描述符——它不是缺陷性的焦苦，而是介于\"完美烘焙\"与\"轻度过烘\"之间的微妙地带。感官上类似烤得恰到好处的法式薄饼（Crêpe）边缘的那圈轻微焦化、或是面包片在烤架上多停了几秒后的淡淡焦皮气息——带有一丝干燥苦香，但整体仍在甜感的包裹之中。在口腔中，微焦感以轻柔的苦香起始，中段保有一定的甜苦平衡，余韵呈现出短暂的干燥收束，不过度拖尾。这种风味有时被认为是深城市烘焙（Full City）咖啡的特征之一，在适度可控时为整体风味增添层次感与复杂度。","cause":"微焦味（Slightly Burnt）处于美拉德反应最优窗口的末段，其特征物质包括：中浓度愈创木酚（Guaiacol）——在低于缺陷阈值的浓度下，愈创木酚贡献的是令人愉悦的\"烟熏烤香\"而非刺鼻的苯酚气息；轻度积累的吡嗪类（Pyrazines）——尤其是2-乙基吡嗪（2-Ethylpyrazine）和三甲基吡嗪（Trimethylpyrazine），在适度浓度下提供可接受的烘烤苦香；糠基硫醇（Furfurylthiol）在略超最优浓度时，香气从\"新鲜烘焙咖啡\"转向\"轻度焦香\"；二酮类（Diketones，如2,3-丁二酮Diacetyl）的氧化产物也在该阶段轻度积累。微焦味的出现通常与烘焙曲线的发展时间（Development Time）延长2–3%或出豆温度（Drop Temperature）超过最优值5–10°C相关，属于工艺精度控制的敏感指标。"},{"id":177,"nameZh":"烘烤谷物","nameEn":"Toasted Grain","categoryId":2,"category":"烘烤味 ROASTED","description":"烘烤谷物强调谷物在烘烤后形成的暖香与轻甜，是谷物类的更具体表达。","flavor":"烘烤谷物风味是谷物系词汇中最令人愉悦的描述符，精准对应烘焙过程中谷物成分受热转化后产生的暖香甜感。在嗅觉上，它类似刚出炉的全麦面包或淡烤麦片饼干（Digestive Biscuit）散发的气息——暖色调的淀粉甜香、轻微的焦糖化底调与新鲜的谷物气息叠合，形成舒适而有辨识度的复合香气。湿嗅后香气更为柔润，透出轻微的黄油感与麦芽甜。在口腔中，烘烤谷物风味以温润的甜感起始，中段有一种\"厚实而朴素\"的质感，余韵以轻柔的烤麦香收尾，整体给人一种亲切、舒适的感官体验，是中度烘焙（Medium Roast）的典型风味特征之一。","cause":"烘烤谷物风味的形成得益于美拉德反应在中温段（160–190°C）的精准进行，主要呈香物质包括：2-乙酰基-1-吡咯啉（2-AP）——烤面包、爆米花、米饭的共同特征物质，贡献温暖的谷物烤香；麦芽醇（Maltol）和乙基麦芽醇（Ethyl Maltol）由焦糖化反应产生，赋予典型的烤麦甜香（焦糖-棉花糖气息）；2-乙酰基呋喃（2-Acetylfuran）和5-甲基糠醛（5-Methylfurfural）提供烤麦片的坚果甜香调；糠醇（Furfuryl Alcohol）在适宜浓度下贡献柔和的烘烤甜感。此外，生豆中的蔗糖（约占干重6–9%）经焦糖化分解为葡萄糖、果糖及其衍生物，这些小分子糖类再经美拉德反应与氨基酸结合，是烘烤谷物甜香最重要的前体物质来源。"},{"id":178,"nameZh":"新鲜麦芽","nameEn":"Fresh Malt","categoryId":2,"category":"烘烤味 ROASTED","description":"新鲜麦芽强调更干净、更明亮的麦芽甜香与谷物香，而非深烘焙的焦糖化麦芽。","flavor":"新鲜麦芽风味是烘烤类词汇中难得的\"明亮\"成员，其感官印象与深色焦糖麦芽截然不同——它类似麦芽糖果（麦芽糖）或现磨大麦麦芽粉的清新甜香，带有轻盈的谷物感与淡淡的青草甜意，整体是干净的、有活力的、微微透明感的。在嗅觉上，新鲜麦芽香清新而不沉重，如刚研磨的淡色麦芽（Pilsner Malt）或麦芽糖浆从容器中溢出的清甜气息；湿嗅后，轻微的发酵甜感浮现，类似新鲜麦芽饮料（无醇啤酒）的香气。在口腔中，这种风味以干净的甜感为主导，酸度轻柔，醇厚感适中，余韵以谷物甜香收尾，整体清新怡人。这一风味常见于浅烘焙的高品质水洗处理豆，是烘焙发展恰到好处的感官信号。","cause":"新鲜麦芽风味的关键物质是麦芽醇（Maltol，3-Hydroxy-2-methyl-4-pyranone）——这是经典的\"麦芽甜香\"标志化合物，由麦芽糖和蔗糖在中低温（约150–170°C）焦糖化时生成，阈值约约35 ppb，在水溶液中呈现新鲜麦芽糖的典型香甜气息。2-甲基-3-羟基-4-吡喃酮（Corylone）与麦芽醇结构相似，同样贡献柔和的谷物甜香。乙酰基甲基呋喃醇类（Acetylfuranols）化合物提供麦芽-焦糖边界的过渡甜香。此外，淡色麦芽中的二甲基硫醚（DMS，Dimethyl Sulfide）在极低浓度（sub-threshold）下也被认为能提升麦芽感知的新鲜度与明亮感。水洗处理豆的发酵过程中，酵母代谢产生的乙酸乙酯（Ethyl Acetate）和乙醇（Ethanol）作为发酵底调，与麦芽醇共同构建\"新鲜麦芽\"这一干净明亮的感官印象；浅烘时美拉德反应尚未进入焦糖化深度，麦芽醇保持在最佳感知浓度区间，是这一风味得以清晰呈现的工艺前提。"},{"id":179,"nameZh":"其他","nameEn":"Other","categoryId":6,"category":"其他 OTHER","description":"其他（Other）为风味轮中的兜底类别，用于收纳不易归入其他典型性类别的风味特征。","flavor":"作为风味轮的\"捕获层\"，此类风味在杯测中难以精准定位：它们既不属于花果、坚果、烘焙等正向谱系，也不完全符合烟熏、霉腐等已知负向类别。感官上往往呈现出模糊的背景杂味或混合异味，如同多种陌生气息叠压在一起，难以分解为单一词汇，令杯测师感到困惑或需要停顿辨识。这类风味的存在往往提示着咖啡生豆产地、处理或运输环节存在某种不可控的外源干扰。","cause":"该类别不对应单一化学物质，而是多种来源不明异味化合物的综合体现，可能涉及异源萜烯类（如倍半萜）、外源污染物（如农药残留、外部气味吸附），以及咖啡在特殊发酵或储存条件下产生的微量挥发性有机化合物（VOCs）。其成因具有多元性，通常需通过GC-MS进行逐一定性识别。"},{"id":180,"nameZh":"化学","nameEn":"Chemical","categoryId":6,"category":"其他 OTHER","description":"化学气息指类似溶剂、塑料、清洁剂等非食物型气味联想，通常为负向风味。","flavor":"在杯测中，化学气息往往在热闻阶段最为突出，使人联想到实验室溶剂、硬塑料容器或工业清洁剂的刺激性挥发气体，与咖啡应有的烘焙香气形成强烈割裂感。口腔中可感知到一种干燥、刺鼻甚至微微灼热的异感，与正向风味的顺滑或馥郁截然相反。鼻后香（retronasal）阶段同样留有不适感，整体带来明显的异物感和不洁净印象，通常表现为中高强度负向缺陷。","cause":"主要呈味/呈香物质为2,4,6-三氯苯甲醚（2,4,6-Trichloroanisole，TCA）——这是\"Rio异味（Rio off-flavor）\"的核心化合物，由微生物（如青霉属）将外源氯酚甲基化而来，常见于受污染产区的生豆中，感知阈值极低（ppb级）。此外，乙酸乙酯（过发酵副产物）、丙酮等酯类和酮类溶剂物质，以及处理不当产生的卤代芳香族化合物（halogenated aromatics），均可呈现此类气息。其形成与不洁净的湿法发酵槽、储存环境污染及微生物代谢密切相关。"},{"id":181,"nameZh":"陈腐","nameEn":"Stale","categoryId":6,"category":"其他 OTHER","description":"陈腐指香气不新鲜、走味与活性下降的状态，常与氧化或存放时间过长有关。","flavor":"陈腐风味在干香阶段即可察觉——原本活跃的咖啡香气变得沉寂、扁平，如同被一层灰尘覆盖，失去了立体感与层次感。湿香阶段会进一步呈现出一种\"失活\"的霉旧气息，类似于放置多日的冷咖啡液或开封已久的咖啡粉末。入口后，酸质钝化、甜感消退，收尾留有一股模糊的陈腐余韵，整体风味呈现出一种令人不悦的\"老旧感\"，如同一首走调的乐曲只剩最低音。","cause":"主要机制为脂质氧化（lipid oxidation），咖啡豆表面的不饱和脂肪酸（如亚油酸、亚麻酸）在暴露于氧气后，经自动氧化或酶促氧化形成氢过氧化物（hydroperoxides），进一步分解为己醛（hexanal）、壬醛（nonanal）、反-2-壬烯醛（trans-2-nonenal）等短链醛类，产生陈腐气息。同时，2-糠基硫醇（2-furfurylthiol）等关键新鲜香气物质的氧化降解，导致咖啡特征香气的整体衰减。此类变化在烘焙后暴露于空气中数周内即可显著发生，是导致\"走味\"（staleness）的核心化学过程。"},{"id":182,"nameZh":"泥土","nameEn":"Earthy","categoryId":6,"category":"其他 OTHER","description":"泥土气息指土壤、潮湿泥地的联想，可能来自原料、处理或储存环境。","flavor":"泥土风味在杯测干香阶段呈现出一种低沉、潮润的土壤气息，令人联想到雨后翻起的黑土地或潮湿林间的落叶腐殖质层，气味厚重而无明亮感。湿香中这种感知更为清晰，带有轻微的矿物底调。入口后，泥土感以一种\"沉重的地面感\"覆盖在基础味觉上，降低了整体的干净度（clean cup），余韵中持续弥散出土腥味，令整体风味缺乏上扬感和活力。在精品咖啡评分中，此属性一旦出现通常直接扣减干净度分项。","cause":"最主要的呈香化合物为土臭素（Geosmin，反-1,10-二甲基-反-9-萘醇），由土壤链霉菌（*Streptomyces* spp.）和蓝藻代谢产生，感知阈值极低（约5 ng/L）；以及2-甲基异冰片（2-methylisoborneol，2-MIB），同样来源于土壤微生物的萜烯类代谢产物。两者均属于萜烯类（terpenoids）化合物，常在生豆储存阶段因接触含有此类微生物的仓储环境而被咖啡豆脂质吸附。此外，不充分干燥（含水量偏高）导致的微生物活动也可在处理阶段原位合成geosmin。"},{"id":183,"nameZh":"苦味","nameEn":"Bitter","categoryId":6,"category":"其他 OTHER","description":"苦味是咖啡的基础味觉之一，但在杯测记录中通常用来描述\"苦感过强或苦质不佳\"的情况。","flavor":"负向苦味在口腔中的感知区域主要集中于舌根与咽后壁，呈现为一种粗糙、刺穿感强烈的苦感，与高品质咖啡中柔和的\"可可苦甜平衡\"截然不同。这种苦味往往来得突然、去得缓慢，余苦绵延，甚至会在吞咽后遮蔽其他风味层次，令整体杯测体验失衡。质感上偏干涩，常伴随收敛感（astringency），与顺滑饱满的质感背道而驰。深烘豆中的过度苦味更带有微弱的焦苦刺激，有时令人不由自主地皱眉。","cause":"咖啡中苦味的主要呈味物质为绿原酸内酯类（Chlorogenic acid lactones，CGA-lactones）——这是烘焙过程中绿原酸（Chlorogenic acids）脱水环化的产物，中度烘焙中含量最高；以及苯基茚满类（Phenylindanes）——深度烘焙时由绿原酸进一步降解所形成的多聚物，带来更为持久的苦感；此外，咖啡因（Caffeine）约贡献总苦味感知的30%。葫芦巴碱（Trigonelline）在深度烘焙中分解生成的吡啶类（Pyridines）化合物也带来一定苦涩感。过萃取（over-extraction）会显著加剧以上所有成分的呈苦效应。"},{"id":184,"nameZh":"酚味","nameEn":"Phenolic","categoryId":6,"category":"其他 OTHER","description":"酚味常与消毒水、塑料、药水或烟熏刺激等联想相关，通常为缺陷描述。","flavor":"酚味在干香阶段即呈现出一种类似医用碘酒、硬塑料或旧消毒水的刺激性气息，令人立刻联想到药房或手术室的非食物环境。湿香中这种感知并不消散，反而在热水蒸汽的烘托下更为鲜明——一股辛辣、刺鼻、带烟熏感的气味扑面而来。入口后，口腔会感受到一种类似漱口水的灼感，并在喉头留下明显的刺激性余韵，完全遮盖了咖啡应有的甜感与酸质，令整体风味极度失衡，是感官层面识别度极高的严重缺陷。","cause":"主要化合物为愈创木酚（Guaiacol）及其衍生物4-乙基愈创木酚（4-Ethylguaiacol）和4-乙烯基愈创木酚（4-Vinylguaiacol），均为酚类化合物（Phenolics），来源于绿原酸及木质素（Lignin）在烘焙中的热解，或在湿法发酵阶段由肠杆菌科微生物代谢阿魏酸（ferulic acid）产生。此外，2,4,6-三氯苯甲醚（TCA）也可产生药水类酚感。在罗布斯塔豆中，由于绿原酸含量更高，酚味风险也更大；控制发酵温度与时长是减少4-EG产生的关键处理工艺措施。"},{"id":185,"nameZh":"肉汤味","nameEn":"Meaty Brothy","categoryId":6,"category":"其他 OTHER","description":"肉汤味指类似高汤、肉汁的鲜味联想，通常不属于咖啡的理想风味。","flavor":"在杯测中，肉汤味带来一种令人困惑的异位感——当你期待咖啡的果香或烘焙香气时，却意外感知到类似清炖牛肉汤或鸡精的鲜咸气息，与咖啡的风味语境格格不入。这种感知以鼻后香为主，在吞咽后的余韵中尤为明显，会在喉后形成一种温热的、浓稠的\"汤感\"，配合轻微的咸鲜底调。虽然在某些极深烘或Robusta混合豆中偶有出现，但在精品咖啡评鉴中通常视为负向缺陷，尤其当其干扰清甜酸质时。","cause":"主要化学物质为美拉德反应（Maillard Reaction）中Strecker降解产生的甲硫醛（Methional）（由甲硫氨酸/Methionine生成），以及3-甲基丁醛（3-Methylbutanal）等短链Strecker醛类，这些化合物在浓度偏高时呈现肉汤/鲜味联想。此外，谷氨酸（Glutamic acid）和相关含氮化合物在烘焙高温下形成的杂环化合物（如噻唑类/Thiazoles）也会贡献此类风味。咖啡因加工不当、蛋白质前体浓度偏高，或烘焙时间过长均会加剧Strecker醛类的积累。"},{"id":186,"nameZh":"动物味","nameEn":"Animalic","categoryId":6,"category":"其他 OTHER","description":"动物味指皮毛、牲畜棚、动物性体味等联想，通常为负向风味。","flavor":"动物味在感官上带来强烈的\"非饮料\"联想，令人直接联想到未清洗的皮革、羊棚或宠物皮毛的潮湿气息。在干香阶段往往已有前兆，而湿香阶段则会更为直接地散发出一种低沉、浊重的动物性气息，使鼻腔产生明显不适感。入口后，这种气味感受延伸至喉后，与咖啡应有的甜感和酸质形成强烈冲突，整体带来不洁净、粗糙的口感体验。通常在天然处理法（Natural Process）发酵控制不当或存在异常微生物菌群时出现。","cause":"主要化学物质为吲哚（Indole）和粪臭素（Skatole，3-甲基吲哚/3-Methylindole）——两者均属吲哚类有机物，在咖啡浆果腐烂、不洁净发酵或果皮层存在过度微生物活动时，由色氨酸（Tryptophan）经粪肠球菌等细菌代谢产生。此外，对甲酚（p-Cresol）和4-乙基苯酚（4-Ethylphenol）也可呈现皮革/动物类气息。这类化合物的累积直接与天然处理法或蜜处理中发酵层温度过高、果皮堆积厌氧时间过长密切相关。"},{"id":187,"nameZh":"霉味","nameEn":"Musty","categoryId":6,"category":"其他 OTHER","description":"霉味指潮湿、闷霉与不通风环境的气息联想，常被视为缺陷。","flavor":"霉味在感官上呈现出一种闷塞、密闭空间的气息，类似于长时间不通风的旧房间、湿毛巾或未及时晾干的织物气息，整体呈低沉、扁平的负向底调。在杯测的干香阶段即可感知到一种\"被压住\"的气息，仿佛新鲜香气被一层濡湿的布料遮盖。湿香中这种感知更为完整，带有明显的潮霉特征。入口后，霉味并不刺激，却持续性地遮盖酸质与甜感，令干净度（clean cup）大幅下降，整体风味呈现出一种令人不悦的\"旧\"感。","cause":"主要化合物为土臭素（Geosmin）及2-甲基异冰片（2-MIB）（均为萜烯类，由链霉菌等放线菌代谢产生），以及1-辛烯-3-醇（1-Octen-3-ol）——一种八碳醇类化合物，由霉菌（如青霉属Penicillium、曲霉属Aspergillus）在脂质氧化降解过程中产生，具有蘑菇/霉菌的特征气息。这类化合物的形成与咖啡生豆在高湿度（>13% 含水量）环境中储存，或干燥阶段翻晒不均、堆积过厚导致局部厌氧微生物活动密切相关。"},{"id":188,"nameZh":"发霉","nameEn":"Moldy","categoryId":6,"category":"其他 OTHER","description":"发霉指霉菌生长导致的明显霉菌气味，属于严重缺陷。","flavor":"发霉风味与\"霉味（Musty）\"相比，感知强度更高、更直接——不再是隐约的背景气息，而是一种扑面而来、清晰可辨的真菌性异味，类似面包上出现明显绿色霉斑时的气味，或陈旧地下室角落里积累的真菌气息。在杯测干香阶段即已强烈，湿香中会进一步扩散为充满整个嗅觉空间的霉腐气息。入口后，这种风味在口腔中持久附着，严重干扰所有其他感知维度，在SCA缺陷豆分类中属于A类严重缺陷（Primary Defect），一颗即可污染整杯。","cause":"核心化学物质为1-辛烯-3-醇（1-Octen-3-ol）、1-辛烯-3-酮（1-Octen-3-one）（霉菌蘑菇气息的关键物质），以及2-异丙基-3-甲氧基吡嗪（2-Isopropyl-3-methoxypyrazine）等吡嗪类化合物。此外，曲霉属（*Aspergillus*）和青霉属（*Penicillium*）在代谢生豆脂质和蛋白质时会产生多种有机酸和倍半萜类代谢物。真菌在高湿度（>70% RH）和较高温度下快速繁殖，发霉通常由豆仓卫生条件差、晒场污染或运输途中受潮直接引发。"},{"id":189,"nameZh":"纸味","nameEn":"Papery","categoryId":6,"category":"其他 OTHER","description":"纸味指纸张、纸浆的气息联想，常与氧化或陈化相关。","flavor":"纸味在杯测中的存在感较为低沉，类似于翻阅旧书时飘出的淡淡纸香，或刚打开一包包装纸内侧的气息，整体偏干燥、无甜感、略带尘埃感。在干香阶段表现为一种\"沉默的背景调\"，让整体香气变得平淡无味；湿香中这种感知更为中性，无香气活力。入口后，纸味本身并不刺激，但会大幅降低咖啡应有的鲜活感和层次感，使风味在口腔中快速散逸，余韵极为短促，呈现出令人失望的\"空洞感\"。","cause":"主要来源于脂质氧化产生的短链醛类，尤其是己醛（Hexanal）和戊醛（Pentanal），由亚油酸（Linoleic acid）氧化降解生成，在烘焙豆暴露于空气后数周内即开始积累。纸板/纸张气息还与木质素降解产生的苯甲醛（Benzaldehyde）及微量糠醛类（Furfurals）化合物相关。咖啡豆脂质含量越高（如阿拉比卡），氧化速率越快。烘焙后包装密封不当、储存温度偏高，或使用透气性过强的包装材料，均会加速纸味的产生。"},{"id":190,"nameZh":"纸板味","nameEn":"Cardboard","categoryId":6,"category":"其他 OTHER","description":"纸板味比纸味更重，更偏\"纸箱/硬纸板\"的陈旧联想。","flavor":"纸板味相较于纸味，感知强度更高、气息更为厚重，类似于拆开寄存已久的快递纸箱时的气息，或陈放于仓库角落的硬纸板散发的陈旧气味，带有一定的脂腻氧化感。在杯测湿香阶段，这种气息往往在散热过程中越来越明显，随着咖啡液温度降低，纸板气息反而愈发凸显，盖过了所有正向香气。入口后，口感变得干燥、粗糙，舌面有轻微的涩感，酸质和甜感几乎消失，整体呈现出令人沮丧的\"失鲜\"状态，属于由氧化累积导致的典型陈化缺陷。","cause":"关键化合物为反-2-壬烯醛（trans-2-Nonenal）——已被多项研究（包括ETH Zurich）确认为咖啡纸板异味的标志性化合物，由亚油酸（Linoleic acid）在脂质过氧化级联反应（lipid peroxidation cascade）中经9-氢过氧化物（9-HPODE）的β-裂解产生，感知阈值极低（约0.1 μg/L）。此外，己醛、庚醛等短链饱和醛类也协同贡献纸板气息。烘焙后存放时间过长（超过4周）、包装中氧含量过高，或在冲泡后长时间加热保温，均会显著加速trans-2-nonenal的积累。"},{"id":191,"nameZh":"麻袋味","nameEn":"Baggy","categoryId":6,"category":"其他 OTHER","description":"麻袋味指麻袋、黄麻袋或仓储袋材带来的陈旧仓储气息，常见于生豆储存缺陷描述。","flavor":"麻袋味带有强烈的仓储联想，是那种掀开装满生咖啡豆的麻布袋时扑面而来的气息——一股混合着粗糙植物纤维、旧谷仓和陈年木屑气息的复合气味，低沉、干燥，略带霉旧感但不同于直接发霉。在杯测的干香阶段，这种气息使香气整体变得浑浊；湿香中它会以一种\"草根感\"压制正向花果调；入口后，麻袋味主要在鼻后香和余韵中呈现，削弱甜感，使回甘变得粗糙，并在收尾处留下令人不适的陈仓余味，在精品咖啡评鉴中是明显降分项。","cause":"主要化学物质为吡嗪类化合物，包括2-甲氧基-3-异丙基吡嗪（2-Methoxy-3-isopropylpyrazine）和2-甲氧基-3-乙基吡嗪（2-Methoxy-3-ethylpyrazine），由黄麻（Jute）纤维分解及与之共存的微生物代谢产生，感知阈值极低（ng/L级）。此外，黄麻纤维在微生物作用下降解产生的脂肪族醛类（Aliphatic aldehydes），以及储存期间生豆吸附的萜烯类化合物（如倍半萜类）也有一定贡献。麻袋（黄麻袋/Jute bags）本身是生豆储运的传统包装材料，但其有机纤维在湿热环境中易发生微生物降解，将挥发性异味通过豆体多孔结构吸附迁移至豆内。"},{"id":192,"nameZh":"干木头","nameEn":"Dry Wood","categoryId":6,"category":"其他 OTHER","description":"干木头强调更干燥、更粉尘化的木质联想，通常偏陈化与不新鲜方向。","flavor":"干木头风味在感官上呈现出一种极度干燥、粗粝的木质气息，类似木工车间的锯末或老旧木器柜的内壁，带有轻微的粉尘感和木纤维的粗糙质感，气息低沉而毫无活力。在干香阶段，这种气息取代了应有的烘焙甜香，令整体香气变得苍白；湿香中木质气息偏向干枯、缺乏油润感，不同于圆润的\"雪松\"或\"檀木\"等正向木质调。入口后，风味在口腔中呈现出干燥、单薄的质地，甜感和质感均受到明显压制，尾韵中留有一种木粉般的粗糙感，整体评分通常偏低。","cause":"主要化学物质包括愈创木酚（Guaiacol）及其同系物（来自木质素热解），以及顺/反-β-大马酮类（β-Damascenone）等降异戊二烯类化合物在低浓度时偏向干木香。此外，咖啡中木糖（Xylose）和甘露糖（Mannose）等多糖在过度烘焙中降解产生的糠醛（Furfural）类化合物，也带来干燥木质感。脱水的绿原酸骨架残余物在深烘焙过程中同样贡献此类气息。生豆在仓储中因含水量持续下降（低于8%以下）而导致细胞壁多糖降解，是干木头味的产地层面成因。"},{"id":193,"nameZh":"木质","nameEn":"Woody","categoryId":6,"category":"其他 OTHER","description":"木质指木头、木屑或干木材的气息联想，可为中性到负向。","flavor":"木质风味在感官上呈现出一种干燥而厚重的木材气息，介于中性与负向之间，具体表现取决于其强度与烘焙背景。轻微的木质调类似于新剥开的雪松杆、干净的橡木桶内壁或铅笔杆的木芯，气息清晰而有结构感，可在深烘豆中充当稳固的香气骨架；而偏负向的木质感则类似陈旧木板、粗糙木屑或旧家具抽屉，气息板滞、缺乏活力，令整体风味失去层次。在杯测干香阶段，木质感多以底调形式出现，湿香中变得更为明显；入口后，木质感带来轻微的干涩与收敛，压制了甜感的发展，余韵中木质气息持续弥散，使收尾显得粗糙而厚重。杯测评价中，木质感若为主调则通常对均衡度（Balance）与整体杯质（Overall）产生负向影响。","cause":"核心化学物质来自咖啡豆细胞壁中木质素（Lignin）在烘焙热解过程中生成的愈创木酚（Guaiacol）、丁香酚（Eugenol）、甲基丁香酚（Methyleugenol）及4-乙烯基愈创木酚（4-Vinylguaiacol）等苯丙素类（Phenylpropanoids）化合物；细胞壁多糖（半纤维素/Hemicellulose）降解产生的糠醛（Furfural）和5-甲基糠醛（5-Methylfurfural）亦贡献干木质感。此外，β-大马酮（β-Damascenone）等降异戊二烯类（Norisoprenoids）在低阈值浓度下偏向干燥木质联想。木质风味的强度与烘焙程度、生豆含水量及细胞壁结构的完整性高度相关，过度烘焙（超过FC+阶段）或使用陈旧老豆（Bean Age偏大）均会显著放大木质感。"},{"id":194,"nameZh":"橡胶","nameEn":"Rubber","categoryId":6,"category":"其他 OTHER","description":"橡胶气息指轮胎/橡皮的异味联想，通常为明显缺陷。","flavor":"橡胶风味在感官上具有极高的识别度——一旦出现，杯测师几乎无法忽略。其气息类似于新轮胎的刺鼻挥发气味、橡皮擦摩擦后散发的合成橡胶味，或自行车内胎充气时的气息，整体尖锐、刺激，带有明显的工业异物感。在干香阶段即可感知，湿香中随热气蒸腾，刺激感进一步上扬，扑面而来的橡胶气息完全遮盖了咖啡应有的烘焙香。入口后，橡胶味以鼻后嗅觉为主，在口腔中制造出一种令人不适的化学刺激感，尾韵留有持久而闷热的胶味残留，令整体杯质（Clean Cup）大幅下降，在SCA评鉴中属于高扣分缺陷。","cause":"橡胶气息的核心化学来源为含硫化合物，尤其是苯并噻唑（Benzothiazole）及其衍生物——这类化合物在橡胶硫化工艺中大量产生，在咖啡中则主要由含硫氨基酸（半胱氨酸/Cysteine、甲硫氨酸/Methionine）在烘焙美拉德反应路径中形成。二甲基二硫醚（Dimethyl disulfide，DMDS）和二甲基三硫醚（Dimethyl trisulfide，DMTS）在较高浓度时同样呈现橡胶/硫化物复合气息。此外，4-乙烯基苯酚（4-Vinylphenol）和酚类衍生物的高浓度积累也可产生橡胶气联想。微生物污染（尤其是不洁净湿法发酵中的变形杆菌、产气荚膜梭菌等厌氧菌活动）或罗布斯塔豆中特有的硫化物前体物质，均是橡胶气息风险升高的重要成因。"},{"id":195,"nameZh":"臭鼬味","nameEn":"Skunky","categoryId":6,"category":"其他 OTHER","description":"臭鼬味常用来描述强烈的硫化物/陈旧发酵类异味联想，通常为缺陷。","flavor":"臭鼬味在感官上极为突出、几乎无法误判——它是那种令人瞬间皱眉、下意识后退的刺激性气息，类似北美臭鼬（Skunk）受惊时喷射的腺体分泌物气味，或光照后变质啤酒散发的\"光臭味\"，呈现出强烈的硫磺刺激感与动物腺体异味的叠加。在杯测干香阶段，即便极低剂量也令整个杯测桌弥漫不适；湿香中气息更为直接，带有尖锐的穿透感。入口后，这种气味主要通过鼻后嗅觉强烈冲击，与咖啡的任何正向风味完全无法共存，是精品咖啡中极为罕见但一旦出现即为\"一票否决\"级别的严重缺陷。","cause":"臭鼬味的标志性化学物质为3-甲基-2-丁烯-1-硫醇（3-Methyl-2-butenyl-1-thiol，MBT），又称\"光臭化合物\"——这是啤酒在紫外线照射下异葎草酮（Isohumulone）与硫化氢反应的产物，在咖啡中虽非直接类比，但其他高强度硫醇类（Thiols）化合物，如乙硫醇（Ethanethiol）、正丙硫醇（Propanethiol），可在厌氧过发酵环境中由微生物（尤其是产硫化氢的硫酸盐还原菌）代谢含硫氨基酸生成，并在极低浓度（ppt级）产生此类气息。二甲基硫醚（Dimethyl sulfide，DMS）在高浓度时亦呈现类似气息。这类缺陷通常与密封桶厌氧发酵失控、发酵温度过高（>35℃）或发酵时间严重超标（>72小时）密切相关。"},{"id":196,"nameZh":"石油","nameEn":"Petroleum","categoryId":6,"category":"其他 OTHER","description":"石油气息指汽油/煤油样的挥发性异味联想，通常为严重负向。","flavor":"石油风味是咖啡感官评鉴中最令人不安的缺陷之一，其气息与汽油站加油时散发的挥发气体、煤油炉点火瞬间或新沥青路面的刺激气味高度吻合，带有明显的烃类挥发物的辛辣穿透感，完全超出食物气味的正常边界。在杯测干香阶段，石油气息往往在嗅觉上形成强烈的异物冲击感；湿香中随热气的蒸发而更加浓烈，令鼻腔产生明显的刺激反应。入口后，口腔中会感受到类似于误触化学燃料的灼热感，尾韵中留有持久的油烃类残留，完全破坏咖啡的整体杯质，属于SCA标准下的严重缺陷（Primary Defect），一旦检出须立即终止评鉴。","cause":"石油类气息主要来源于多环芳烃类（Polycyclic Aromatic Hydrocarbons，PAHs）及脂肪族烃类（Aliphatic Hydrocarbons）——这类化合物通常并非咖啡豆本身烘焙过程的产物，而是外源污染的结果，包括：运输或储存中与燃料/溶剂直接接触（如油污麻袋、被污染的集装箱）；在使用石化燃料的直火烘焙机中，烟气回流导致苯（Benzene）、甲苯（Toluene）、二甲苯（Xylene）等BTX化合物直接附着于豆体表面。咖啡豆多孔的脂质结构使其极易吸附此类挥发性有机物（VOCs）。此外，甲基萘（Methylnaphthalene）等萘系化合物在某些储运污染场景中也有检出记录。"},{"id":197,"nameZh":"药味","nameEn":"Medicinal","categoryId":6,"category":"其他 OTHER","description":"药味指药水、消毒水或药柜气息的联想，常与酚类或不洁净发酵有关。","flavor":"药味在感官上呈现出与医疗环境高度关联的气息联想——类似于碘酒消毒棉球、医院走廊、止咳糖浆或老式药柜内挥发的综合气息，带有酚类化合物特有的辛辣消毒感，与食物的任何正常气息框架都格格不入。在杯测干香阶段，药味往往以一种尖锐的、穿透性较强的气息凌驾于其他香气之上；湿香中药感更为清晰，有时伴随轻微的漱口水气息。入口后，口腔产生一种轻微灼热的刺激感，舌面感受到化学涩感，尾韵中药味悠长，对甜感和酸质的遮蔽效果极为显著，令整体风味严重失衡，通常判定为高强度缺陷。","cause":"主要化学物质为愈创木酚（Guaiacol）、4-乙基愈创木酚（4-Ethylguaiacol，4-EG）、4-乙烯基愈创木酚（4-Vinylguaiacol，4-VG）及2-氯苯酚（2-Chlorophenol）等酚类化合物——其中4-EG被WCR感官词典明确标注为\"药用/烟熏\"（Medicinal/Smoky）参考物质。2,6-二氯苯酚（2,6-Dichlorophenol）在ppt浓度即可呈现强烈药水感。这类化合物的产生机制有两种：一是烘焙过程中绿原酸（CGA）热解脱羟基生成4-VG进而转化为4-EG；二是湿法发酵过程中特定肠杆菌科细菌（如大肠杆菌 *E. coli*）代谢阿魏酸（Ferulic acid）产生4-EG，这也是湿处理发酵槽管理不善时药味风险急剧上升的根本原因。"},{"id":198,"nameZh":"干稻草","nameEn":"Dry Straw","categoryId":6,"category":"其他 OTHER","description":"干稻草指更干、更枯的草秆气息联想，相比\"干草\"更偏枯黄与纤维感。","flavor":"干稻草风味在感官上呈现出一种极度干燥、枯槁而粗粝的植物纤维气息，类似于农场里晒干的水稻秸秆捆、夏末收割后田野中的稻秆气息，或触碰到枯黄稻草时手上沾染的植物纤维尘埃气息，整体毫无甜感、无活力，且带有轻微的谷壳粉尘感。在杯测干香阶段，这种气息使整体香气显得极为苍白和\"无生命感\"；湿香中同样缺乏活力，气息如同蒸发掉水分后只剩植物骨架的谷物废料。入口后，风味在口腔中呈现为干燥、单薄的质地，缺乏油脂感与甜感支撑，余韵短促且伴有谷物纤维的粗糙感，整体给人一种豆质欠佳、处理或储存过度的印象。","cause":"干稻草气息的主要化学来源为植物纤维素（Cellulose）和半纤维素（Hemicellulose）降解产生的顺-3-己烯醛（cis-3-Hexenal）和反-2-己烯醛（trans-2-Hexenal）等C6醛类（俗称\"青草醛\"），以及1-戊烯-3-酮（1-Penten-3-one）等不饱和酮类，这些化合物在低浓度时呈现干燥草本气息。此外，2-乙酰基呋喃（2-Acetylfuran）和甲基呋喃类（Methylfurans）化合物在干燥条件下由多糖降解产生，呈现干枯谷物感。咖啡生豆在过度干燥（含水量降至8%以下）、存放时间过长或在高温仓储中受到热损伤时，细胞内活性成分分解，C6醛类等挥发性化合物浓度上升，是干稻草风味在仓储缺陷豆中频繁出现的直接成因。"},{"id":199,"nameZh":"皮革味","nameEn":"Leather","categoryId":6,"category":"其他 OTHER","description":"皮革味指皮革制品、鞣革或皮革箱的气息联想，常见于深色风味谱系描述。","flavor":"皮革味在咖啡感官词汇中具有一定的双重性：在烟草、黑巧克力、雪茄等深色风味谱系中，轻微的皮革气息可被视为复杂度的组成部分，类似于高品质雪茄盒或精制皮质笔记本散发的干燥、厚重而有质感的皮革香，带有隐约的鞣酸气息和动物性底调；而强烈的皮革感则会令人联想到旧皮具或皮革厂的刺激性气息，偏向动物腐败方向，形成明显的负向缺陷。在杯测干香中，皮革感以低沉、厚重的底调出现；湿香中随温度下降而更为明显；入口后，皮革味通过鼻后嗅觉在喉后形成一种厚实、略带涩感的收尾，若强度控制在低至中等水平，可为深烘豆增添结构感，若强度过高则严重影响均衡度。","cause":"皮革气息的主要化学来源为酚类化合物和含氮杂环化合物的协同呈香——核心物质包括：4-乙基苯酚（4-Ethylphenol，4-EP）和4-乙基愈创木酚（4-Ethylguaiacol）（WCR感官词典将4-EP标注为\"皮革/动物/培根\"参考物质）；吲哚（Indole）在低浓度时（<1 ppm）呈现皮革、动物皮革的气息而非粪臭感。此外，深烘焙产生的吡嗪类（Pyrazines）化合物（如三甲基吡嗪）与酚类协同，共同形成皮革-烟熏-可可的复合底调。4-EP的生成与酒香酵母属（Brettanomyces/Dekkera）在发酵阶段的代谢活动密切相关，在天然处理法或不洁净湿法发酵中风险显著上升。"},{"id":200,"nameZh":"鱼腥味","nameEn":"Fishy Odor","categoryId":6,"category":"其他 OTHER","description":"鱼腥味为明显异味联想，通常属于严重缺陷。","flavor":"鱼腥味是咖啡感官评鉴中识别度最高、接受度最低的缺陷风味之一，其气息类似于不新鲜的海鱼、鱼市场的腥臭气或过期鱼粉的挥发性腥气，带有强烈的胺类刺激感和令人不适的蛋白质腐败联想。在杯测干香阶段，即便微量也足以令整个嗅觉焦点偏移；湿香中随热气散发，腥气更为浓烈，令杯测师几乎无法继续正常评鉴流程。入口后，这种气息通过鼻后嗅觉在口腔内形成强烈的腥臭覆盖，与咖啡的所有正向风味（甜、酸、烘焙香）完全对立，属于SCA标准下的绝对性严重缺陷，一旦检出，杯测豆通常直接判定报废。","cause":"鱼腥味的核心化学物质为三甲胺（Trimethylamine，TMA）和二甲胺（Dimethylamine，DMA）——均属挥发性胺类（Volatile Amines），由腐败微生物（包括产胺细菌，如摩氏摩根菌 *Morganella morganii*）代谢蛋白质/氨基酸（尤其是氧化三甲胺/TMAO的还原）产生，感知阈值极低（TMA约1 ppb）。丁酸（Butyric acid）和戊酸（Valeric acid）等短链脂肪酸在高浓度时协同产生腐败腥气。此外，哌啶（Piperidine）和尸胺（Cadaverine）等生物胺，在豆果严重过度发酵或受到腐败性微生物大量污染时亦可检出。天然处理法中浆果过熟腐烂、湿法处理中去果皮不彻底且长时间未换水，是产生鱼腥味的最常见工艺成因。"},{"id":201,"nameZh":"油耗味","nameEn":"Rancid","categoryId":6,"category":"其他 OTHER","description":"油耗味指油脂氧化酸败产生的哈喇味/陈油味，常见于坚果与油脂类食品变质联想。","flavor":"油耗味在感官上具有高度辨识性，类似于放置过久的花生油、未密封坚果的哈喇气息，或用旧食用油炒菜时锅中散发的刺鼻酸败烟气，整体呈现出一种厚重、油腻且令人反感的酸腐感。在杯测干香阶段，油耗味以一种沉闷、发酸的脂质气息覆盖在香气之上；湿香中随温度升高而更为清晰，与正向的坚果或奶油香截然不同——它的\"厚重\"是腐败方向而非醇厚方向。入口后，油耗味在舌面形成一种令人不适的黏腻油感，并伴随明显的酸败余味持续弥散，完全遮盖咖啡应有的甜感与干净收尾，属于脂质管理失控的典型仓储或豆质缺陷。","cause":"油耗味的核心机制为咖啡豆脂质的自动氧化（Autoxidation）与酶促氧化，主要化学物质包括：己醛（Hexanal）、庚醛（Heptanal）、壬醛（Nonanal）——由咖啡脂肪酸（亚油酸/Linoleic acid、油酸/Oleic acid）氧化分解的脂质过氧化物（Lipid hydroperoxides）β-裂解产生；反-2,4-癸二烯醛（trans-2,4-Decadienal）在高浓度时产生典型哈喇感；丁酸（Butyric acid）（短链脂肪酸/SCFA，由甘油三酯的水解酸败产生）带来刺激性酸腐联想。咖啡豆脂质约占干重的12-18%（阿拉比卡），烘焙打开豆体多孔结构后，脂质大量暴露于氧气，氧化速率加速，高温储存（>25℃）、高湿度及光照均会显著加剧氧化酸败进程，是导致油耗味的主要工艺与储运失控成因。"},{"id":202,"nameZh":"烟熏","nameEn":"Smoky","categoryId":6,"category":"其他 OTHER","description":"烟熏风味是由木材燃烧产生的香气联想，常带干燥烟香与烘烤后调；在咖啡中可能来自深烘焙或外源气味吸附。","flavor":"烟熏风味在咖啡感官谱系中处于一个特殊位置——它可以是令人着迷的深度风味修饰，也可以是令人不快的严重缺陷，关键取决于其来源与强度。正向的烟熏感类似于壁炉松木燃烧后的温暖烟香、日式焙茶（ほうじ茶）或高品质正山小种红茶散发的松烟气息，带有干燥、温热、略带甜感的木质烟香，与咖啡的深烘焙焦糖感形成令人愉悦的共鸣；负向的烟熏感则类似于过度烧焦的焦炭气息或刺鼻的工业烟雾，完全遮盖咖啡的细腻层次。在杯测干香中，烟熏感往往以\"干燥的深色气息\"率先登场；湿香中凝聚为更为集中的烟熏调；入口后，烟熏风味通过口腔整体感知弥散开来，在舌面带来轻微的苦涩收敛感，余韵中烟香悠长，正向时令人回味，负向时令人不适。","cause":"烟熏风味的核心化学物质为愈创木酚（Guaiacol）——这是最重要的烟熏风味化合物，也是WCR感官词典中\"烟熏\"属性的首要参考物质，由木质素（Lignin）在300-400℃热解产生。4-甲基愈创木酚（4-Methylguaiacol）和丁香酚（Eugenol）协同增强烟熏木质感；呋喃类（Furans）化合物（如2-呋喃甲醛/Furfural）在深烘焙中大量生成，贡献干燥烟香调；吡嗪类（Pyrazines）（如2,5-二甲基吡嗪）同样具有烘烤烟熏特征。在工艺层面，烟熏风味的产生有两条路径：内源性路径——深度烘焙（二爆后/Vienna Roast以上）导致愈创木酚类化合物大量积累；外源性污染路径——直火烘焙机烟气回流、咖啡豆在运输/储存中接触木材烟气或其他燃烧源，通过豆体脂质吸附外源烟熏挥发物，是产地加工和烘焙操作控制的重要关注点。"},{"id":203,"nameZh":"玫瑰","nameEn":"Rose","categoryId":3,"category":"花香 FLORAL","description":"玫瑰香气是精品咖啡中最具辨识度的花香之一，尤以高海拔日晒或厌氧处理的埃塞俄比亚、巴拿马瑰夏品种中表现突出，是顶级精品咖啡的重要风味标志。","flavor":"如一捧刚剪下的新鲜玫瑰花瓣贴近鼻尖，香气饱满而不刺激，甜润中带有淡淡蜡质感与粉感。入口后花香在口腔中缓缓绽放，伴随着轻盈的浆果甜底与柔软的酸质，仿佛将玫瑰花瓣轻轻融化于舌尖。余韵悠长，花香气息在咽喉处萦绕不散，整体令人联想到玫瑰花茶或土耳其玫瑰软糖，是一种令人屏息的感官体验。","cause":"玫瑰核心香气由香叶醇（geraniol）与苯乙醇（2-phenylethanol）主导构建——前者具有典型的清甜玫瑰花香，后者则带来柔和的蜂蜜玫瑰感，二者在高海拔慢速发酵与低温烘焙中得以完整保留；芳樟醇（linalool）在低浓度下进一步叠加轻盈的橙花-玫瑰复合调，丰富花香层次；此外，发酵过程中酵母代谢产生的β-大马士酮（β-damascenone）虽阈值极低，却以极微量浓度赋予咖啡标志性的玫瑰果甜润底色，四者协同形成这一令人难忘的花香风味组合。"},{"id":204,"nameZh":"西梅干","nameEn":"Dried Plum","categoryId":1,"category":"果香 FRUITY","description":"西梅干风味在咖啡中呈现出浓郁的深色果香，兼具甜、酸、略带发酵感的复杂层次，常见于中深度烘焙的也门、埃塞俄比亚日晒豆以及部分厌氧处理批次，是深沉果香风味的典型代表。","flavor":"如掰开一颗饱满的西梅干，扑面而来的是深邃的浓缩果香——蜜甜、微酸，带着恰到好处的发酵感与轻微的单宁收敛。这种香气浓郁而不沉闷，甜度饱满如糖渍果干，酸质低沉圆润如黑醋栗果酱。入口后，果香在口腔中缓慢释放，如同在舌面上展开一层厚实的果酱涂层，质地丰腴，余韵带有隐约的木质与微苦的可可底调，整体令人联想到用西梅干酿制的果酒或深色糖浆。","cause":"西梅干风味的核心骨架由糠醛（furfural）与5-甲基糠醛（5-methylfurfural）构建，二者在美拉德反应中大量生成，赋予咖啡焦糖化果干的甜熟感；乙酸乙酯（ethyl acetate）与乙酸异戊酯等酯类化合物在发酵阶段积累，带来典型的果酒发酵甜香；异戊醇（isoamyl alcohol）在高温烘焙中进一步转化，叠加出西梅特有的浓缩甜润调；与此同时，深色烘焙产生的吡嗪类化合物（pyrazines）以微量浓度为底层注入轻微的苦甜黑巧底色，与果香甜形成动态平衡，驱动了这一风味的完整呈现。"},{"id":205,"nameZh":"红苹果","nameEn":"Red Apple","categoryId":1,"category":"果香 FRUITY","description":"红苹果风味是咖啡中清甜果香的经典代表，以苹果的脆甜、新鲜果汁感与明亮酸质为特征，常见于中浅烘焙的肯尼亚、哥伦比亚及云南高海拔水洗豆，是充满活力与愉悦感的风味符号。","flavor":"如咬下一口新鲜红富士苹果的瞬间——清脆的甜感与明亮的果汁酸质同时迸发，果香轻盈而直接，既没有深色果干的浓重，也没有热带水果的奔放，清甜中透出一种令人愉悦的克制与纯净。入口后，苹果般的酸质活泼跳跃，如同苹果酸在舌面轻轻弹奏，甜感随之紧跟，形成鲜明的酸甜对话。余韵干净清爽，带有淡淡的苹果皮微涩与新鲜果汁的尾韵，整体给人以明媚、清透的感官印象。","cause":"红苹果风味的核心由苹果酸（malic acid）主导——这是咖啡中最具代表性的有机酸之一，在高海拔慢速成熟的咖啡果实中大量积累，直接构建明亮跳跃的苹果酸感；己醛（hexanal）与反式-2-己烯醛（trans-2-hexenal）等C6醛类化合物在轻度烘焙中得以保留，赋予新鲜苹果皮特有的青苹果-果汁清香；酯类化合物中，丁酸乙酯（ethyl butyrate）与己酸乙酯（ethyl hexanoate）以微量浓度强化了苹果汁感的甜润联想；此外，乙醛（acetaldehyde）在杯中赋予轻微的新鲜苹果发酵感，作为隐性香气骨架支撑整体风味的生动性，四者协同完成了这一清透果香的完整构建。"},{"id":206,"nameZh":"八角","nameEn":"Star Anise","categoryId":9,"category":"香料味 SPICES","description":"八角风味在咖啡中呈现出独特的东方香料特征，甜润而辛香，药草感与甜感兼具，常见于部分也门摩卡豆、日晒埃塞俄比亚以及某些特殊厌氧发酵批次，赋予咖啡神秘而浓郁的香料复杂度。","flavor":"如打开一罐老式香料盒的瞬间，八角那甜润饱满、带着轻微茴香脑辛感的香气徐徐散开——既不像薄荷那般凛冽，也不似肉桂那般刺激，而是以一种圆润、内敛、带着糖渍甜感的方式占据嗅觉空间。入口后，甜辛感在口腔中层层展开，如同一种缓慢融化的香料糖，伴随着轻微的花香底调与温暖的木质回甘，余韵绵长持久，香料的甘甜在咽喉处徐徐消散，整体令人联想到热红酒或东方香料奶茶。","cause":"八角风味的绝对主导分子是茴香脑（trans-anethole），这一化合物既可源于特定品种咖啡果实代谢产物的残留，也可在厌氧发酵过程中通过特定微生物代谢途径少量产生，其甜润辛香的感官特征在咖啡中极具穿透力；雌黄素（estragole，甲基胡椒酚）作为茴香脑的同分异构体，以更柔和的草本甜辛调对主香进行修饰与圆润；在烘焙阶段，美拉德反应产物中的烷基吡嗪类（alkylpyrazines）以坚果-香料复合调为底层构建温暖感；与此同时，发酵阶段积累的少量丁香酚（eugenol）进一步叠加丁香-八角的香料复合印象，四者共同营造出这一东方香料风味组合。"},{"id":207,"nameZh":"姜","nameEn":"Ginger","categoryId":9,"category":"香料味 SPICES","description":"姜香风味赋予咖啡温暖、辛辣而略带刺激感的香料特征，既有新鲜姜片的辛锐，也有姜糖或姜饼的甜润变体，常见于也门、苏门答腊湿刨法豆以及部分厌氧处理批次，是咖啡中最具温暖感的香料风味之一。","flavor":"如嚼下一片新鲜老姜——最初是干净利落的辛辣冲感，随即转化为温暖而绵长的回甘，喉咙处留下一股独特的热感余韵。在咖啡中，姜香往往以更柔和的方式呈现：不是生姜的刺激，而是更接近姜糖或姜饼干的暖甜感，带着轻微的木质辛香底调。入口后，这种温暖的香料感从口腔延伸至喉头，形成一种从内而外的暖意，与咖啡的果酸和甜感构成有趣的张力，余韵悠长，整体令人联想到一杯热腾腾的姜汁撞奶或肉桂姜饼拿铁。","cause":"姜风味的核心辛辣感由姜烯酚（shogaol）与姜辣素（gingerol）类化合物驱动，这类化合物可在特定发酵条件下，由微生物对咖啡果实中酚类前体物质的代谢转化而微量产生；α-姜烯（α-zingiberene）与β-倍半水芹烯（β-sesquiphellandrene）等倍半萜类化合物负责构建姜香的木质辛香骨架；烘焙中形成的甲基环戊烯醇酮（MCPO，maple lactone）以焦糖-姜糖甜感对辛辣主调进行温润包裹，将\"生姜辛锐感\"转化为\"姜糖暖甜感\"；挥发性硫化物在极微量浓度下则进一步强化姜香的穿透力与立体感，四者协同完成了这一温暖香料风味的完整构建。"},{"id":208,"nameZh":"烟熏","nameEn":"Smoky","categoryId":2,"category":"烘烤味 ROASTED","description":"烟熏风味是咖啡烘焙度与处理法共同作用下的复杂产物，在深度烘焙豆、苏门答腊湿刨法（Giling Basah）以及特定炭火烘焙豆中表现尤为突出，是咖啡风味光谱中最具力量感与深度的特征之一。","flavor":"如站在一座木材燃烧的篝火旁——空气中弥漫着干燥的烟熏气息，木质焦香与炭火余温混合，既有威士忌桶的焦木甜感，也有正山小种红茶那种松木烟熏的标志性迷人韵味。在咖啡中，烟熏风味以厚重、低沉、带着明显苦甜底色的方式占据口腔，质地如同黑巧克力与炭烤木材的结合。入口后，烟熏感从舌根向咽喉蔓延，余韵漫长而深邃，伴随着轻微的矿物质感与木炭灰烬的干燥收敛，整体令人联想到泥煤威士忌或日式炭火烘焙煎茶，是一种需要静下来细细体会的、成熟而有分量的风味体验。","cause":"烟熏风味的核心分子是愈创木酚（guaiacol）与4-甲基愈创木酚（4-methylguaiacol）——两者均为木质素（lignin）在高温热解过程中的核心裂解产物，深度烘焙时大量生成，直接构建标志性的木质烟熏感；糠硫醇（2-furfurylthiol，2-FFT）虽为咖啡最关键的新鲜烘焙香气化合物，但在过度烘焙或受热不均时，其氧化降解产物会以硫磺-橡胶-烟熏复合调的形式出现，强化烟熏的负向极端表现；吡啶类（pyridines）与吡咯类（pyrroles）化合物在深度美拉德反应中大量积累，贡献干燥、焦苦的炭火底调；苯酚（phenol）及其同系物则进一步叠加类似消毒水-烟草-炭火的复合烟熏联想，在苏门答腊湿刨法中因高水分含量下的特殊干燥工艺而格外突出，四者协同驱动了这一深邃烟熏风味的完整呈现。"},{"id":209,"nameZh":"可可","nameEn":"Cacao","categoryId":2,"category":"烘烤味 ROASTED","description":"可可风味是咖啡中最为普遍也最具辨识度的烘焙类风味之一，横跨从浅烘到深烘的宽广烘焙区间，既有生可可豆的青涩果酸感，也有黑巧克力的醇厚苦甜，还有热可可饮料般的圆润奶感变体，广泛出现于中南美洲、非洲及云南中深度烘焙批次中，是咖啡风味轮上承上启下的核心节点。","flavor":"如掰开一块精心调配的85%黑巧克力——最先感受到的是可可粉特有的干燥香气，带着烘烤坚果的温热底调，随即涌现出深沉的苦甜感，如同可可脂在舌面缓缓融化，丰腴而有质地。在咖啡中，可可风味往往以两种面貌呈现：其一是黑巧克力式的，苦甜明确、质地厚重、余韵带轻微单宁收敛；其二是热可可式的，更为圆润温柔，带有奶脂感与焦糖甜底，如同一杯加了蜂蜜的热可可。两者之间的过渡，恰好对应着咖啡从中烘到深烘的烘焙梯度，令人在同一杯液体中感受到可可世界的完整光谱。余韵绵长，干净的苦甜在喉咙深处徐徐消散，令人回味。","cause":"可可风味的核心骨架由烘焙过程中美拉德反应与焦糖化反应共同搭建。吡嗪类化合物（pyrazines）——尤其是2,3,5-三甲基吡嗪（2,3,5-trimethylpyrazine）与2-乙基-3,5-二甲基吡嗪（2-ethyl-3,5-dimethylpyrazine）——是可可与坚果烘烤气息的核心贡献者，在中深度烘焙阶段大量生成，赋予咖啡标志性的干燥烘烤可可感；苯乙醛（phenylacetaldehyde）以蜂蜜-可可复合甜香对主调进行包裹，构建巧克力感的甜润层次；可可碱（theobromine）与咖啡因（caffeine）这两种生物碱在结构上与可可豆高度同源，其苦感协同形成黑巧克力特有的苦甜平衡；此外，挥发性硫醇类化合物——特别是糠硫醇（2-furfurylthiol，2-FFT）在中等浓度下与吡嗪类产生复合协同效应，进一步强化烘烤可可的深度与立体感；在发酵阶段，乙酸乙酯等酯类化合物则为整体风味叠加了一抹隐约的可可果肉甜酸，令可可风味在杯中呈现出从\"生豆果壳\"到\"精制黑巧\"的完整层次演变，五者协同驱动了这一经典烘焙风味的完整构建。"}]};
const CAT_COLORS  = {"1":{"main":"#C45E3E","mid":"#D47D5E","light":"#EBCBB8","nameZh":"果香","nameEn":"FRUITY"},"2":{"main":"#5A4535","mid":"#7A6050","light":"#C8BDB5","nameZh":"烘烤味","nameEn":"ROASTED"},"3":{"main":"#C9736B","mid":"#D9958F","light":"#EDD5D2","nameZh":"花香","nameEn":"FLORAL"},"4":{"main":"#8B6240","mid":"#A88060","light":"#DCCCB8","nameZh":"坚果/可可","nameEn":"NUTTY/COCOA"},"5":{"main":"#5A8A5E","mid":"#7AAD7E","light":"#C8DEC9","nameZh":"绿色/植物","nameEn":"GREEN/VEGETATIVE"},"6":{"main":"#7A8A90","mid":"#9AAAB0","light":"#D2DADD","nameZh":"其他","nameEn":"OTHER"},"7":{"main":"#C49A3C","mid":"#D4B264","light":"#EAD9A8","nameZh":"酸味/发酵味","nameEn":"SOUR/FERMENTED"},"8":{"main":"#7B6BAD","mid":"#9D8FC5","light":"#D8D1EE","nameZh":"甜味","nameEn":"SWEET"},"9":{"main":"#B87040","mid":"#CC9060","light":"#E8CDB0","nameZh":"香料味","nameEn":"SPICES"}};

// ==================== 状态 ====================
let sectors    = [];
let activeFlId = null;
let activeCatId= null;

// ==================== 初始化 ====================
buildLegend();
drawWheel();
setupSearch();

// ==================== 图例 ====================
function buildLegend() {
  const el = document.getElementById('legend');
  FLAVOR_DATA.categories.forEach(cat => {
    const c = CAT_COLORS[cat.id] || {};
    const d = document.createElement('div');
    d.className = 'leg-item';
    d.dataset.catId = cat.id;
    d.innerHTML =
      '<div class="leg-dot" style="background:' + c.main + '"></div>' +
      '<span class="leg-name">' + (c.nameZh || cat.name) + '</span>' +
      '<span class="leg-cnt">' + cat.count + '</span>';
    d.onclick = () => selectCategory(cat.id);
    el.appendChild(d);
  });
}

// ==================== 绘制风味轮 ====================
function drawWheel() {
  const canvas = document.getElementById('flavorCanvas');
  const ctx    = canvas.getContext('2d');
  const W = 920, H = 920, cx = W/2, cy = H/2;
  const R    = 450;   // 最外圈
  const midR = 300;   // 内外圈分界
  const inR  = 172;   // 中心圆半径

  ctx.clearRect(0,0,W,H);

  const cats    = FLAVOR_DATA.categories;
  const flavors = FLAVOR_DATA.flavors;
  const total   = flavors.length;

  const catMap = {};
  cats.forEach(c => { catMap[c.id] = []; });
  flavors.forEach(f => { if (catMap[f.categoryId]) catMap[f.categoryId].push(f); });

  sectors = [];
  let startAng = -Math.PI / 2;

  // === Pass 1: 色块 ===
  cats.forEach(cat => {
    const items = catMap[cat.id] || [];
    if (!items.length) return;
    const catAng = (items.length / total) * 2 * Math.PI;
    const endAng = startAng + catAng;
    const c = CAT_COLORS[cat.id] || { main:'#999', mid:'#bbb', light:'#ddd' };
    const sub = catAng / items.length;

    // 外圈：每个风味词一个扇形
    items.forEach((fl, fi) => {
      const s = startAng + fi * sub;
      const e = s + sub - 0.001;
      const isActive = (fl.id === activeFlId);
      const fillColor = isActive
        ? c.main
        : (fi % 2 === 0 ? c.mid : c.light);

      ctx.beginPath();
      ctx.moveTo(cx + midR * Math.cos(s), cy + midR * Math.sin(s));
      ctx.arc(cx, cy, isActive ? R+8 : R, s, e);
      ctx.arc(cx, cy, midR, e, s, true);
      ctx.closePath();
      ctx.fillStyle = fillColor;
      ctx.fill();
      ctx.strokeStyle = '#F5EFE6';
      ctx.lineWidth = isActive ? 2 : 1;
      ctx.stroke();

      sectors.push({ type:'flavor', s, e, rIn:midR, rOut:R+8, fl });
    });

    // 内圈：分类色块
    const isCatActive = (cat.id === activeCatId);
    ctx.beginPath();
    ctx.moveTo(cx + inR * Math.cos(startAng), cy + inR * Math.sin(startAng));
    ctx.arc(cx, cy, isCatActive ? midR+6 : midR, startAng, endAng);
    ctx.arc(cx, cy, inR, endAng, startAng, true);
    ctx.closePath();
    ctx.fillStyle = isCatActive ? shadeColor(c.main, -15) : c.main;
    ctx.fill();
    ctx.strokeStyle = '#F5EFE6';
    ctx.lineWidth = 1.5;
    ctx.stroke();

    sectors.push({ type:'category', s:startAng, e:endAng, rIn:inR, rOut:midR+6, catId:cat.id });
    startAng = endAng;
  });

  // === Pass 2: 文字（横向，不旋转）===
  startAng = -Math.PI / 2;
  cats.forEach(cat => {
    const items = catMap[cat.id] || [];
    if (!items.length) return;
    const catAng = (items.length / total) * 2 * Math.PI;
    const endAng = startAng + catAng;
    const c = CAT_COLORS[cat.id] || {};
    const sub = catAng / items.length;

    // 外圈文字
    items.forEach((fl, fi) => {
      const s = startAng + fi * sub;
      const e = s + sub - 0.001;
      const midAng = (s + e) / 2;
      const textR  = (midR + R) / 2;
      const tx = cx + textR * Math.cos(midAng);
      const ty = cy + textR * Math.sin(midAng);

      const arcLen = sub * textR;
      const radW   = R - midR;
      let fs = Math.min(radW / 2.0, arcLen / 1.6, 26);
      fs = Math.max(14, fs);

      const label = fl.nameZh || '';
      const maxW  = arcLen * 0.82;
      const charW = fs * 1.05;
      const maxN  = Math.floor(maxW / charW);
      if (maxN < 1) return;
      const disp = maxN < label.length
        ? (maxN >= 2 ? label.slice(0, maxN-1) + '…' : label[0])
        : label;

      const isActive = (fl.id === activeFlId);
      ctx.save();
      ctx.font = (isActive ? '800 ' : '500 ') + fs + 'px "PingFang SC","Microsoft YaHei",sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.shadowColor = 'rgba(255,255,255,0.92)';
      ctx.shadowBlur  = 5;
      ctx.fillStyle   = isActive ? '#fff' : '#1C0F08';
      ctx.fillText(disp, tx, ty);
      ctx.restore();
    });

    // 内圈文字
    const ma = (startAng + endAng) / 2;
    const lr = (inR + midR) / 2;
    const lx = cx + lr * Math.cos(ma);
    const ly = cy + lr * Math.sin(ma);
    const innerArcLen = catAng * lr;
    const c2 = CAT_COLORS[cat.id] || {};
    const nameZh = c2.nameZh || '';
    let ifs = Math.min((midR - inR) / 2.2, innerArcLen / (nameZh.length * 1.15), 28);
    ifs = Math.max(16, ifs);

    const iMaxN = Math.floor(innerArcLen * 0.82 / (ifs * 1.05));
    const iDisp = iMaxN < nameZh.length
      ? (iMaxN >= 2 ? nameZh.slice(0, iMaxN-1) + '…' : nameZh[0])
      : nameZh;

    ctx.save();
    ctx.font = '700 ' + ifs + 'px "PingFang SC","Microsoft YaHei",sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = '#fff';
    ctx.shadowColor = 'rgba(0,0,0,0.55)';
    ctx.shadowBlur  = 6;
    ctx.fillText(iDisp, lx, ly);
    ctx.restore();

    startAng = endAng;
  });

  // 中心圆
  ctx.beginPath();
  ctx.arc(cx, cy, inR - 4, 0, 2*Math.PI);
  const g = ctx.createRadialGradient(cx-20, cy-20, 4, cx, cy, inR);
  g.addColorStop(0, '#FFFDF8');
  g.addColorStop(1, '#EDE0CE');
  ctx.fillStyle = g;
  ctx.fill();
  ctx.strokeStyle = 'rgba(140,100,70,0.25)';
  ctx.lineWidth = 2;
  ctx.stroke();
}

// ==================== 颜色工具 ====================
function shadeColor(hex, pct) {
  const n = parseInt(hex.slice(1), 16);
  const t = pct < 0 ? 0 : 255, p = pct < 0 ? pct * -1 : pct;
  const R = (n >> 16) + Math.round((t - (n >> 16)) * p / 100);
  const G = ((n >> 8) & 0x00FF) + Math.round((t - ((n >> 8) & 0x00FF)) * p / 100);
  const B = (n & 0x0000FF) + Math.round((t - (n & 0x0000FF)) * p / 100);
  return '#' + [R,G,B].map(v => Math.min(255,Math.max(0,v)).toString(16).padStart(2,'0')).join('');
}

// ==================== 点击交互 ====================
const canvas = document.getElementById('flavorCanvas');

canvas.addEventListener('click', e => {
  const rect  = canvas.getBoundingClientRect();
  const scaleX = 920 / rect.width, scaleY = 920 / rect.height;
  const mx = (e.clientX - rect.left) * scaleX;
  const my = (e.clientY - rect.top) * scaleY;
  const dx = mx - 460, dy = my - 460;
  const dist = Math.sqrt(dx*dx + dy*dy);
  let ang = Math.atan2(dy, dx);

  for (const s of sectors) {
    if (dist < s.rIn || dist > s.rOut) continue;
    let sa = s.s, ea = s.e, a = ang;
    if (ea > Math.PI && a < 0) a += 2*Math.PI;
    if (sa < -Math.PI/2 && a > Math.PI/2) a -= 2*Math.PI;
    if (a >= sa && a <= ea) {
      if (s.type === 'flavor') selectFlavor(s.fl);
      else selectCategory(s.catId);
      return;
    }
  }
});

// Tooltip on hover
canvas.addEventListener('mousemove', e => {
  const rect  = canvas.getBoundingClientRect();
  const scaleX = 920 / rect.width, scaleY = 920 / rect.height;
  const mx = (e.clientX - rect.left) * scaleX;
  const my = (e.clientY - rect.top) * scaleY;
  const dx = mx - 460, dy = my - 460;
  const dist = Math.sqrt(dx*dx + dy*dy);
  let ang = Math.atan2(dy, dx);
  const tip = document.getElementById('tooltip');

  for (const s of sectors) {
    if (dist < s.rIn || dist > s.rOut) continue;
    let sa = s.s, ea = s.e, a = ang;
    if (ea > Math.PI && a < 0) a += 2*Math.PI;
    if (sa < -Math.PI/2 && a > Math.PI/2) a -= 2*Math.PI;
    if (a >= sa && a <= ea) {
      const name = s.type === 'flavor'
        ? (s.fl.nameZh + ' · ' + s.fl.nameEn)
        : (CAT_COLORS[s.catId]?.nameZh || '') + ' 分类';
      tip.textContent = name;
      tip.style.left = e.clientX + 'px';
      tip.style.top  = e.clientY + 'px';
      tip.classList.add('show');
      canvas.style.cursor = 'pointer';
      return;
    }
  }
  tip.classList.remove('show');
  canvas.style.cursor = 'default';
});
canvas.addEventListener('mouseleave', () => {
  document.getElementById('tooltip').classList.remove('show');
});

// ==================== 选中风味 ====================
function selectFlavor(fl) {
  activeFlId  = fl.id;
  activeCatId = fl.categoryId;
  drawWheel();
  renderDetail(fl);
  renderCatList(fl.categoryId, fl.id);
  updateLegendActive(fl.categoryId);
  document.getElementById('searchInput').value = '';
  document.getElementById('searchHint').textContent = '已选中：' + fl.nameZh;
}

function selectCategory(catId) {
  activeCatId = catId;
  activeFlId  = null;
  drawWheel();
  renderCatList(catId, null);
  updateLegendActive(catId);
  // 清空详情
  const card = document.getElementById('detailCard');
  card.className = 'detail-card empty';
  card.innerHTML = '<div class="detail-body"><div class="empty-hint">已选中「' +
    (CAT_COLORS[catId]?.nameZh || '') + '」分类<br>从下方列表点击查看具体风味</div></div>';
}

function updateLegendActive(catId) {
  document.querySelectorAll('.leg-item').forEach(el => {
    el.classList.toggle('active', parseInt(el.dataset.catId) === catId);
  });
}

// ==================== 渲染详情 ====================
function renderDetail(fl) {
  const c = CAT_COLORS[fl.categoryId] || {};
  const card = document.getElementById('detailCard');
  card.className = 'detail-card';

  const secs = [];
  if (fl.flavor)      secs.push({ icon:'☕', title:'风味体验', text:fl.flavor });
  if (fl.description) secs.push({ icon:'📖', title:'风味定义', text:fl.description });
  if (fl.cause)       secs.push({ icon:'🔬', title:'风味成因', text:fl.cause });

  card.innerHTML =
    '<div class="detail-hd" style="background:linear-gradient(135deg,' + c.main + ',' + c.mid + ')">' +
      '<div class="detail-hd-info">' +
        '<span class="detail-zh">' + fl.nameZh + '</span>' +
        '<span class="detail-en">' + fl.nameEn + '</span>' +
      '</div>' +
      '<span class="detail-cat-tag">' + (c.nameZh||'') + '</span>' +
    '</div>' +
    '<div class="detail-body">' +
      secs.map(s =>
        '<div class="detail-sec">' +
          '<div class="sec-hd"><span>' + s.icon + '</span>' + s.title + '</div>' +
          '<span class="sec-body">' + s.text + '</span>' +
        '</div>'
      ).join('') +
    '</div>';
}

// ==================== 分类列表 ====================
function renderCatList(catId, activeId) {
  const c    = CAT_COLORS[catId] || {};
  const fls  = FLAVOR_DATA.flavors.filter(f => f.categoryId === catId);
  const card = document.getElementById('flavorListCard');
  card.style.display = '';
  document.getElementById('flistTitle').textContent = (c.nameZh || '') + ' · 全部风味';
  document.getElementById('flistCount').textContent = fls.length + ' 个';
  const body = document.getElementById('flistBody');
  body.innerHTML = fls.map(f =>
    '<div class="flist-item' + (f.id === activeId ? ' active' : '') + '" data-id="' + f.id + '">' +
      '<div class="flist-dot" style="background:' + c.main + '"></div>' +
      '<div class="flist-info">' +
        '<span class="flist-zh">' + f.nameZh + '</span>' +
        '<span class="flist-en">' + f.nameEn + '</span>' +
      '</div>' +
      '<span class="flist-arr">›</span>' +
    '</div>'
  ).join('');
  body.querySelectorAll('.flist-item').forEach(el => {
    el.onclick = () => {
      const fl = FLAVOR_DATA.flavors.find(f => f.id === parseInt(el.dataset.id));
      if (fl) selectFlavor(fl);
    };
  });
  // 滚动到激活项
  const activeEl = body.querySelector('.flist-item.active');
  if (activeEl) activeEl.scrollIntoView({ block:'nearest' });
}

// ==================== 搜索 ====================
function setupSearch() {
  const inp = document.getElementById('searchInput');
  inp.addEventListener('input', () => {
    const q = inp.value.trim();
    if (!q) {
      document.getElementById('searchHint').textContent = '共 209 个风味词条，覆盖 9 大风味分类';
      document.getElementById('flavorListCard').style.display = 'none';
      return;
    }
    const results = FLAVOR_DATA.flavors.filter(f =>
      f.nameZh.includes(q) || f.nameEn.toLowerCase().includes(q.toLowerCase()) ||
      (f.description && f.description.includes(q)) ||
      (f.flavor && f.flavor.includes(q))
    );
    document.getElementById('searchHint').textContent =
      results.length ? '找到 ' + results.length + ' 个匹配词条' : '未找到相关词条';
    renderSearchResults(results, q);
  });
}

function renderSearchResults(results, q) {
  const card = document.getElementById('flavorListCard');
  if (!results.length) { card.style.display = 'none'; return; }
  card.style.display = '';
  document.getElementById('flistTitle').textContent = '搜索结果';
  document.getElementById('flistCount').textContent = results.length + ' 条';
  const body = document.getElementById('flistBody');
  body.innerHTML = results.map(f => {
    const c = CAT_COLORS[f.categoryId] || {};
    return '<div class="flist-item" data-id="' + f.id + '">' +
      '<div class="flist-dot" style="background:' + c.main + '"></div>' +
      '<div class="flist-info">' +
        '<span class="flist-zh">' + highlight(f.nameZh, q) + '</span>' +
        '<span class="flist-en">' + f.nameEn + ' · ' + (c.nameZh||'') + '</span>' +
      '</div>' +
      '<span class="flist-arr">›</span>' +
    '</div>';
  }).join('');
  body.querySelectorAll('.flist-item').forEach(el => {
    el.onclick = () => {
      const fl = FLAVOR_DATA.flavors.find(f => f.id === parseInt(el.dataset.id));
      if (fl) { selectFlavor(fl); document.getElementById('searchInput').value = ''; }
    };
  });
}

function highlight(text, q) {
  if (!q) return text;
  return text.replace(new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + ')','gi'),
    '<mark style="background:#FFF0A0;border-radius:2px;padding:0 1px">$1</mark>');
}
